<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Summer Afternoon — Your Terrain</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#f4d9a4;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  canvas{display:block}

  #ui{position:fixed;inset:0;pointer-events:none;z-index:10}

  #loader{position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:50;
    background:linear-gradient(170deg,#89c5e8 0%,#cfe3e4 42%,#f6d9a8 100%);
    transition:opacity .9s ease}
  #loader.gone{opacity:0;pointer-events:none}
  .sun{width:64px;height:64px;border-radius:50%;
    background:radial-gradient(circle,#fff6d8 0%,#ffd98a 55%,rgba(255,199,110,0) 72%);
    animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:.85}50%{transform:scale(1.18);opacity:1}}
  #status{margin-top:22px;font-size:13px;letter-spacing:.14em;
    text-transform:uppercase;color:#5c4a35;font-weight:600}
  #sub{margin-top:8px;font-size:12px;color:#7d6b54;max-width:320px;text-align:center;line-height:1.6}

  #enable{margin-top:26px;pointer-events:auto;cursor:pointer;border:none;
    padding:13px 30px;border-radius:999px;background:#5c4a35;color:#fdf3df;
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;
    transition:transform .2s ease,background .2s ease}
  #enable:hover{transform:translateY(-2px);background:#463829}
  #enable.hide{display:none}

  #place{position:fixed;top:24px;left:26px;color:#5c4a35;z-index:11;
    text-shadow:0 1px 0 rgba(255,255,255,.4)}
  #place h1{font-size:15px;font-weight:700;letter-spacing:.03em}
  #place p{font-size:11px;opacity:.72;margin-top:3px;letter-spacing:.06em}

  #hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    color:#5c4a35;font-size:11px;letter-spacing:.13em;text-transform:uppercase;
    opacity:.6;z-index:11;text-align:center;line-height:1.9}

  #panel{position:fixed;top:22px;right:22px;z-index:12;pointer-events:auto;
    background:rgba(255,250,240,.72);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.6);border-radius:14px;padding:14px 16px;
    width:212px;box-shadow:0 8px 26px rgba(120,90,50,.14)}
  #panel label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    color:#7d6b54;margin-bottom:5px;font-weight:600}
  #panel input[type=range]{width:100%;margin-bottom:13px;accent-color:#c98b4b}
  #panel .row{display:flex;gap:7px;margin-top:4px}
  #panel button{flex:1;pointer-events:auto;cursor:pointer;border:none;border-radius:8px;
    padding:8px 4px;background:#e8d3ac;color:#5c4a35;font-size:10px;font-weight:600;
    letter-spacing:.07em;text-transform:uppercase}
  #panel button:hover{background:#dcc399}
  #toggle{position:fixed;top:22px;right:22px;z-index:13;pointer-events:auto;cursor:pointer;
    width:34px;height:34px;border:none;border-radius:10px;background:rgba(255,250,240,.72);
    backdrop-filter:blur(14px);color:#5c4a35;font-size:15px;display:none}
</style>
</head>
<body>

<div id="loader">
  <div class="sun"></div>
  <div id="status">Waking the afternoon</div>
  <div id="sub">This uses your location to sculpt the real elevation around you into a world.</div>
  <button id="enable">Use my location</button>
</div>

<div id="place" style="display:none">
  <h1 id="placeName">—</h1>
  <p id="placeMeta">—</p>
</div>

<button id="toggle">☰</button>
<div id="panel" style="display:none">
  <label>Elevation <span id="vExag"></span></label>
  <input id="exag" type="range" min="0.4" max="4" step="0.05" value="1.6">
  <label>Grass density <span id="vGrass"></span></label>
  <input id="grass" type="range" min="0" max="100" step="1" value="60">
  <label>Time of day</label>
  <input id="tod" type="range" min="0" max="100" step="1" value="72">
  <div class="row">
    <button id="btnTop">Top-down</button>
    <button id="btnLow">Ground</button>
  </div>
</div>

<div id="hint" style="display:none">
  Move mouse to look · Scroll to zoom · Drag to orbit<br>WASD or arrows to walk
</div>

<script type="module" src="./terrain.js"></script>
</body>
</html>
