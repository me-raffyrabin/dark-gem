<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0710" />
<title>Veilwalker — The Realm Above</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root{
    --void:#0a0710;
    --deep:#131022;
    --midnight:#1d1735;
    --gold:#e3b04b;
    --ember:#d9603a;
    --arcane:#6b4fa3;
    --mist:#8ea3c7;
    --parchment:#efe6d0;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; background:var(--void); }
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--parchment);
    height:100dvh;
    display:grid;
    grid-template-rows:1fr 1fr;
    position:relative;
  }

  /* ---------- TOP: the Realm vista ---------- */
  #vistaWrap{ position:relative; overflow:hidden; background:var(--void); }
  #vista{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  .hud{ position:absolute; z-index:5; pointer-events:none; }

  .realm-chip{
    top:calc(env(safe-area-inset-top, 0px) + 12px); left:14px;
    display:flex; flex-direction:column; gap:1px;
    padding:8px 14px 9px;
    background:linear-gradient(160deg, rgba(19,16,34,.82), rgba(10,7,16,.65));
    border:1px solid rgba(227,176,75,.35);
    border-radius:3px;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    box-shadow:0 4px 18px rgba(0,0,0,.5), inset 0 0 12px rgba(227,176,75,.06);
  }
  .realm-chip .eyebrow{
    font-size:9px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--mist); font-weight:500;
  }
  .realm-chip .name{
    font-family:'Cormorant Garamond',serif;
    font-size:21px; font-weight:600; line-height:1.1;
    color:var(--gold);
    text-shadow:0 0 14px rgba(227,176,75,.35);
    transition:opacity .5s ease;
  }
  .realm-chip .name.fading{ opacity:0; }

  .compass{
    top:calc(env(safe-area-inset-top, 0px) + 12px); right:14px;
    width:52px; height:52px;
  }
  .compass svg{ width:100%; height:100%; overflow:visible; }
  #compassRose{ transform-origin:50% 50%; transition:transform .12s linear; }

  .coord-bar{
    left:50%; bottom:26px; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px;
    padding:6px 16px;
    background:rgba(10,7,16,.6);
    border:1px solid rgba(227,176,75,.25);
    border-radius:2px;
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    font-size:10.5px; letter-spacing:.14em; font-weight:500;
    color:var(--parchment); white-space:nowrap;
  }
  .coord-bar .rune{ color:var(--gold); font-size:9px; }

  .hint-toast{
    left:50%; top:50%; transform:translate(-50%,-50%);
    padding:10px 20px;
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:16px; color:var(--parchment);
    background:rgba(10,7,16,.55);
    border:1px solid rgba(227,176,75,.3);
    border-radius:2px;
    backdrop-filter:blur(5px);
    -webkit-backdrop-filter:blur(5px);
    opacity:0; transition:opacity 1s ease;
    text-align:center; max-width:78%;
  }
  .hint-toast.show{ opacity:1; }

  /* ---------- DIVIDER: the Threshold ---------- */
  .threshold{
    position:absolute; left:0; right:0; top:50%;
    height:0; z-index:20; pointer-events:none;
  }
  .threshold .bar{
    position:absolute; left:0; right:0; top:-2px; height:4px;
    background:linear-gradient(90deg,
      transparent, rgba(227,176,75,.15) 12%,
      var(--gold) 46%, #f6dfa4 50%, var(--gold) 54%,
      rgba(227,176,75,.15) 88%, transparent);
    box-shadow:0 0 16px rgba(227,176,75,.5), 0 0 46px rgba(217,96,58,.25);
  }
  .threshold .gem{
    position:absolute; left:50%; top:0; transform:translate(-50%,-50%) rotate(45deg);
    width:16px; height:16px;
    background:linear-gradient(135deg, #f6dfa4, var(--gold) 55%, var(--ember));
    border:1px solid rgba(246,223,164,.9);
    box-shadow:0 0 18px rgba(227,176,75,.85), 0 0 44px rgba(217,96,58,.5);
    animation:gemPulse 4.7s ease-in-out infinite;
  }
  @keyframes gemPulse{
    0%,100%{ box-shadow:0 0 14px rgba(227,176,75,.7), 0 0 34px rgba(217,96,58,.35); }
    50%{ box-shadow:0 0 26px rgba(227,176,75,1), 0 0 64px rgba(217,96,58,.6); }
  }

  /* ---------- BOTTOM: the mortal map ---------- */
  #mapWrap{ position:relative; overflow:hidden; background:var(--deep); touch-action:none; }
  #map{ position:absolute; inset:0; }
  #ghostMap{ position:absolute; inset:0; width:100%; height:100%; display:none; }
  /* alchemical dark transmutation of the base cartography */
  #map .maplibregl-canvas{
    filter:invert(.92) hue-rotate(205deg) saturate(.55) brightness(.82) contrast(1.08);
  }
  .map-tint{
    position:absolute; inset:0; pointer-events:none; z-index:2;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(227,176,75,.10), transparent 55%),
      radial-gradient(140% 110% at 50% 115%, rgba(107,79,163,.18), transparent 60%);
    mix-blend-mode:screen;
  }
  .map-vignette{
    position:absolute; inset:0; pointer-events:none; z-index:2;
    box-shadow:inset 0 0 90px rgba(10,7,16,.9);
  }

  .maplibregl-ctrl-attrib{
    background:rgba(10,7,16,.55)!important;
    font-size:9px!important;
  }
  .maplibregl-ctrl-attrib a{ color:var(--mist)!important; }

  .recenter{
    position:absolute; right:14px;
    bottom:calc(env(safe-area-inset-bottom, 0px) + 22px);
    z-index:6;
    width:46px; height:46px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg, rgba(29,23,53,.92), rgba(10,7,16,.88));
    border:1px solid rgba(227,176,75,.5);
    border-radius:50%;
    color:var(--gold);
    box-shadow:0 4px 16px rgba(0,0,0,.6), inset 0 0 10px rgba(227,176,75,.08);
    cursor:pointer;
  }
  .recenter:active{ transform:scale(.93); }
  .recenter svg{ width:20px; height:20px; }

  .map-label{
    position:absolute; left:14px;
    bottom:calc(env(safe-area-inset-bottom, 0px) + 24px);
    z-index:6; pointer-events:none;
    font-size:9px; letter-spacing:.24em; text-transform:uppercase;
    color:var(--mist); font-weight:500;
    display:flex; align-items:center; gap:8px;
  }
  .map-label::before{
    content:""; width:22px; height:1px;
    background:linear-gradient(90deg, var(--gold), transparent);
  }

  /* user rune marker */
  .rune-marker{ width:26px; height:26px; position:relative; }
  .rune-marker .core{
    position:absolute; inset:7px;
    background:radial-gradient(circle, #f6dfa4 0%, var(--gold) 55%, var(--ember) 100%);
    border-radius:50%;
    box-shadow:0 0 12px rgba(227,176,75,.9);
  }
  .rune-marker .ring{
    position:absolute; inset:0; border:1.5px solid var(--gold);
    border-radius:50%;
    animation:runePulse 2.6s ease-out infinite;
  }
  .rune-marker .ring:nth-child(2){ animation-delay:1.3s; }
  @keyframes runePulse{
    0%{ transform:scale(.5); opacity:1; }
    100%{ transform:scale(2.4); opacity:0; }
  }

  .geo-note{
    position:absolute; left:50%; top:14px; transform:translateX(-50%);
    z-index:6; padding:6px 14px;
    font-size:10px; letter-spacing:.08em; color:var(--mist);
    background:rgba(10,7,16,.7);
    border:1px solid rgba(142,163,199,.3);
    border-radius:2px;
    opacity:0; transition:opacity .6s ease;
    pointer-events:none; white-space:nowrap;
    max-width:92%; overflow:hidden; text-overflow:ellipsis;
  }
  .geo-note.show{ opacity:1; }

  /* ---------- DIAGNOSTICS (WhatsUpDocMD-style raw error surfacing) ---------- */
  .diag-btn{
    position:absolute; left:14px;
    bottom:calc(env(safe-area-inset-bottom, 0px) + 74px);
    z-index:40;
    width:34px; height:34px;
    display:flex; align-items:center; justify-content:center;
    background:rgba(10,7,16,.8);
    border:1px solid rgba(142,163,199,.35);
    border-radius:50%;
    color:var(--mist); font-size:14px;
    cursor:pointer;
  }
  .diag-btn .badge{
    position:absolute; top:-4px; right:-4px;
    min-width:15px; height:15px; padding:0 3px;
    display:none; align-items:center; justify-content:center;
    background:var(--ember); color:#fff;
    border-radius:8px; font-size:9px; font-weight:600;
  }
  .diag-btn.has-errors{ border-color:var(--ember); color:var(--ember); }
  .diag-btn.has-errors .badge{ display:flex; }

  .diag-panel{
    position:absolute; left:10px; right:10px;
    bottom:calc(env(safe-area-inset-bottom, 0px) + 116px);
    max-height:42%;
    z-index:41;
    display:none; flex-direction:column;
    background:rgba(8,6,14,.96);
    border:1px solid rgba(227,176,75,.4);
    border-radius:4px;
    box-shadow:0 8px 30px rgba(0,0,0,.8);
    overflow:hidden;
  }
  .diag-panel.open{ display:flex; }
  .diag-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px;
    border-bottom:1px solid rgba(227,176,75,.2);
    font-size:10px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--gold);
  }
  .diag-head .actions{ display:flex; gap:8px; }
  .diag-head button{
    background:none; border:1px solid rgba(142,163,199,.4);
    color:var(--mist); font-size:9px; letter-spacing:.1em;
    padding:3px 9px; border-radius:2px; cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  #diagLog{
    overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:8px 12px;
    font-family:ui-monospace,'SF Mono',Menlo,monospace;
    font-size:10px; line-height:1.55;
    color:#b9c2d8; white-space:pre-wrap; word-break:break-word;
  }
  #diagLog .err{ color:#f08a6a; }
  #diagLog .ok{ color:#a8c48a; }

  /* ---------- WAYSTONE (dropped pin) ---------- */
  .waystone-chip{
    left:50%; bottom:64px; transform:translateX(-50%);
    display:none; align-items:center; gap:9px;
    padding:5px 8px 5px 14px;
    background:rgba(10,7,16,.72);
    border:1px solid rgba(227,176,75,.5);
    border-radius:2px;
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    font-size:10.5px; letter-spacing:.1em; font-weight:500;
    color:var(--gold); white-space:nowrap;
    pointer-events:auto;
  }
  .waystone-chip.show{ display:flex; }
  .waystone-chip .ws-gem{
    font-size:9px;
    animation:wsGemPulse 2.3s ease-in-out infinite;
  }
  @keyframes wsGemPulse{ 0%,100%{ opacity:.6; } 50%{ opacity:1; } }
  .waystone-chip button{
    background:none; border:none; cursor:pointer;
    color:var(--mist); font-size:12px; line-height:1;
    padding:4px 7px;
  }

  .waystone-pin{ width:26px; height:36px; position:relative; }
  .waystone-pin .head{
    position:absolute; left:50%; top:4px;
    width:14px; height:14px;
    transform:translateX(-50%) rotate(45deg);
    background:linear-gradient(135deg, #f6dfa4, var(--gold) 60%, var(--ember));
    border:1px solid rgba(246,223,164,.95);
    box-shadow:0 0 12px rgba(227,176,75,.9), 0 0 30px rgba(217,96,58,.4);
    animation:wsHover 3.1s ease-in-out infinite;
  }
  .waystone-pin .stem{
    position:absolute; left:50%; top:17px;
    width:1.5px; height:15px;
    transform:translateX(-50%);
    background:linear-gradient(180deg, var(--gold), transparent);
  }
  .waystone-pin .base{
    position:absolute; left:50%; bottom:0;
    width:12px; height:4px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse, rgba(227,176,75,.6), transparent 70%);
  }
  @keyframes wsHover{
    0%,100%{ transform:translateX(-50%) rotate(45deg) translateY(0); }
    50%{ transform:translateX(-50%) rotate(45deg) translateY(-2.5px); }
  }

  .drop-ripple{
    position:absolute; z-index:30;
    width:12px; height:12px; margin:-6px 0 0 -6px;
    border:1.5px solid var(--gold);
    border-radius:50%;
    pointer-events:none;
    animation:dropRipple .7s ease-out forwards;
  }
  @keyframes dropRipple{
    0%{ transform:scale(.4); opacity:1; }
    100%{ transform:scale(4.5); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .threshold .gem{ animation:none; }
    .rune-marker .ring{ animation:none; opacity:.4; transform:scale(1.4); }
    .waystone-pin .head{ animation:none; }
    .waystone-chip .ws-gem{ animation:none; }
  }
</style>
</head>
<body>

  <!-- TOP HALF — the Realm -->
  <section id="vistaWrap" aria-label="Fantasy realm view">
    <canvas id="vista"></canvas>

    <div class="hud realm-chip">
      <span class="eyebrow">Realm sighted</span>
      <span class="name" id="realmName">The Veiled Reach</span>
    </div>

    <div class="hud compass" aria-hidden="true">
      <svg viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="24" fill="rgba(10,7,16,.6)" stroke="rgba(227,176,75,.4)" stroke-width="1"/>
        <g id="compassRose">
          <path d="M26 6 L29 24 L26 22 L23 24 Z" fill="#e3b04b"/>
          <path d="M26 46 L29 28 L26 30 L23 28 Z" fill="rgba(142,163,199,.6)"/>
          <circle cx="26" cy="26" r="2.4" fill="#f6dfa4"/>
        </g>
        <text x="26" y="4" text-anchor="middle" font-size="7" fill="#e3b04b" font-family="Inter">N</text>
      </svg>
    </div>

    <div class="hud coord-bar">
      <span class="rune">◆</span>
      <span id="coordText">— · —</span>
      <span class="rune">◆</span>
    </div>

    <div class="hud waystone-chip" id="waystoneChip">
      <span class="ws-gem">◆</span>
      <span id="waystoneText">Waystone</span>
      <button id="waystoneClear" aria-label="Remove waystone">✕</button>
    </div>

    <div class="hud hint-toast" id="hintToast">
      Drag the map to wander — press &amp; hold to plant a waystone
    </div>
  </section>

  <!-- THE THRESHOLD -->
  <div class="threshold" aria-hidden="true">
    <div class="bar"></div>
    <div class="gem"></div>
  </div>

  <!-- BOTTOM HALF — the mortal map -->
  <section id="mapWrap" aria-label="Interactive map">
    <div id="map"></div>
    <canvas id="ghostMap"></canvas>
    <div class="map-tint"></div>
    <div class="map-vignette"></div>
    <div class="map-label" id="mapLabel">Mortal Cartography</div>
    <div class="geo-note" id="geoNote"></div>
    <button class="recenter" id="recenterBtn" aria-label="Return to my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="12" cy="12" r="7"/>
        <circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
    </button>

    <button class="diag-btn" id="diagBtn" aria-label="Diagnostics">
      ✦<span class="badge" id="diagBadge">0</span>
    </button>
    <div class="diag-panel" id="diagPanel">
      <div class="diag-head">
        <span>Scrying Glass · Diagnostics</span>
        <span class="actions">
          <button id="diagCopy">Copy</button>
          <button id="diagClose">Close</button>
        </span>
      </div>
      <div id="diagLog"></div>
    </div>
  </section>

<script>
/* =====================================================================
   VEILWALKER v2 — split-screen mockup
   Boot order matters: diagnostics first, vista second (never blocked),
   MapLibre loaded async with multi-CDN fallback, and a touch-drag
   ghost map if every CDN fails. Raw errors surface on-screen.
   Design canon: void #0a0710 · gold #e3b04b · ember #d9603a
   ===================================================================== */

/* ============================================================
   0. SCRYING GLASS — on-screen diagnostics (loads before all)
   ============================================================ */
var diagErrCount = 0;
function logDiag(msg, level){
  try{
    var log = document.getElementById('diagLog');
    var line = document.createElement('div');
    var ts = new Date().toISOString().slice(11, 19);
    line.textContent = '[' + ts + '] ' + msg;
    if (level === 'err'){
      line.className = 'err';
      diagErrCount++;
      var btn = document.getElementById('diagBtn');
      btn.classList.add('has-errors');
      document.getElementById('diagBadge').textContent = diagErrCount;
      document.getElementById('diagPanel').classList.add('open');
    } else if (level === 'ok'){
      line.className = 'ok';
    }
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }catch(e){ /* diagnostics must never crash the app */ }
}
window.addEventListener('error', function(e){
  var src = e.filename ? e.filename.split('/').pop() + ':' + e.lineno : '(inline)';
  logDiag('ERROR ' + (e.message || 'unknown') + ' @ ' + src, 'err');
});
window.addEventListener('unhandledrejection', function(e){
  var r = e.reason;
  logDiag('PROMISE ' + (r && r.message ? r.message : String(r)), 'err');
});
document.getElementById('diagBtn').addEventListener('click', function(){
  document.getElementById('diagPanel').classList.toggle('open');
});
document.getElementById('diagClose').addEventListener('click', function(){
  document.getElementById('diagPanel').classList.remove('open');
});
document.getElementById('diagCopy').addEventListener('click', function(){
  var text = document.getElementById('diagLog').innerText;
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(
      function(){ logDiag('log copied to clipboard', 'ok'); },
      function(){ window.prompt('Copy diagnostics:', text); }
    );
  } else {
    window.prompt('Copy diagnostics:', text);
  }
});
logDiag('boot · ua: ' + navigator.userAgent.slice(0, 90));

/* ============================================================
   1. SHARED STATE + UTILITIES
   ============================================================ */
var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hash1(i, seed){ return mulberry32((i * 2654435761) ^ seed)(); }
function smooth(t){ return t * t * (3 - 2 * t); }
function vnoise(x, seed){
  var i = Math.floor(x), f = x - i;
  return hash1(i, seed) * (1 - smooth(f)) + hash1(i + 1, seed) * smooth(f);
}
function fbm(x, seed){
  return vnoise(x, seed) * .55 + vnoise(x * 2.13, seed ^ 0x9e37) * .28 + vnoise(x * 4.7, seed ^ 0x51f2) * .17;
}
function lerp(a, b, t){ return a + (b - a) * t; }

var SYL_A = ['Vor','Ael','Thar','Nym','Kor','Mal','Ish','Dra','Vel','Umb','Cael','Ryn','Orr','Zar','Eth','Syl'];
var SYL_B = ['athel','mar','\u2019dun','ath','oreth','wyn','gard','vaal','iel','myr','\u2019kesh','anor'];
var REALM_KIND = ['Reach of','Vale of','Dominion of','Marches of','Hollow of','Crown of'];
function realmNameFor(cx, cy){
  var r = mulberry32((cx * 73856093) ^ (cy * 19349663) ^ 0xDA7A);
  return REALM_KIND[Math.floor(r() * REALM_KIND.length)] + ' ' +
         SYL_A[Math.floor(r() * SYL_A.length)] + SYL_B[Math.floor(r() * SYL_B.length)];
}

var FALLBACK = { lng:-71.0589, lat:42.3601 }; /* Boston */
var target = { lng:FALLBACK.lng, lat:FALLBACK.lat, bearing:0, zoom:15.4 };
var userPos = { lng:FALLBACK.lng, lat:FALLBACK.lat };
var cur = { lateral:0, forward:0, bearing:0, zScale:1 };
var scene = { water:0, forest:0, urban:.4, road:.4 };
var sceneCur = { water:0, forest:0, urban:.4, road:.4 };
var windVX = 0, lastLateral = 0, realmCell = null;
var map = null, mapReady = false, userMarker = null;
var pin = null;              /* { lng, lat } — the dropped waystone */
var pinMarker = null;        /* maplibre marker when map mode active */

/* ---------- waystone helpers ---------- */
function fmtDist(m){
  return m < 1000 ? Math.round(m) + ' m' : (m / 1000).toFixed(1) + ' km';
}
/* flat-earth approx is plenty at city scale */
function pinDelta(){
  if (!pin) return null;
  var latR = target.lat * Math.PI / 180;
  var dE = (pin.lng - target.lng) * 111320 * Math.cos(latR);
  var dN = (pin.lat - target.lat) * 110540;
  var dist = Math.sqrt(dE * dE + dN * dN);
  var brgTo = Math.atan2(dE, dN) * 180 / Math.PI;          /* 0 = north */
  var rel = ((brgTo - cur.bearing) % 360 + 540) % 360 - 180; /* [-180,180] vs view */
  return { dist:dist, rel:rel };
}

function dropPin(lng, lat, screenX, screenY){
  pin = { lng:lng, lat:lat };
  if (navigator.vibrate) navigator.vibrate(30);
  logDiag('waystone dropped: ' + fmtCoord(lat, lng), 'ok');

  /* ripple at touch point */
  if (screenX !== undefined){
    var rip = document.createElement('div');
    rip.className = 'drop-ripple';
    rip.style.left = screenX + 'px';
    rip.style.top = screenY + 'px';
    document.getElementById('mapWrap').appendChild(rip);
    setTimeout(function(){ rip.remove(); }, 750);
  }

  if (map){
    if (pinMarker){ pinMarker.setLngLat([lng, lat]); }
    else {
      var el = document.createElement('div');
      el.className = 'waystone-pin';
      el.innerHTML = '<div class="head"></div><div class="stem"></div><div class="base"></div>';
      pinMarker = new maplibregl.Marker({ element:el, anchor:'bottom' })
        .setLngLat([lng, lat]).addTo(map);
    }
  }
  document.getElementById('waystoneChip').classList.add('show');
  showGeoNote('Waystone planted — the realm will mark it', 2600);
}
function clearPin(){
  pin = null;
  if (pinMarker){ pinMarker.remove(); pinMarker = null; }
  document.getElementById('waystoneChip').classList.remove('show');
  logDiag('waystone cleared');
}
document.getElementById('waystoneClear').addEventListener('click', clearPin);

/* update chip readout ~3x/s */
setInterval(function(){
  if (!pin) return;
  var pd = pinDelta();
  var dir = Math.abs(pd.rel) < 20 ? 'ahead'
          : (pd.rel > 0 ? 'to your right' : 'to your left');
  if (Math.abs(pd.rel) > 150) dir = 'behind you';
  document.getElementById('waystoneText').textContent =
    'Waystone \u00B7 ' + fmtDist(pd.dist) + ' \u00B7 ' + dir;
}, 320);

/* ---------- long-press to drop (works in map + ghost modes) ----------
   Manual detection: MapLibre doesn't emit contextmenu reliably on iOS,
   and this path must also work when the ghost map is active. */
(function(){
  var wrap = document.getElementById('mapWrap');
  var lpTimer = null, lpStart = null, lpId = null, lpCount = 0;

  function cancelLP(){
    if (lpTimer){ clearTimeout(lpTimer); lpTimer = null; }
    lpStart = null; lpId = null;
  }
  wrap.addEventListener('pointerdown', function(ev){
    if (ev.target.closest('.recenter') || ev.target.closest('.diag-btn') ||
        ev.target.closest('.diag-panel') || ev.target.closest('.waystone-chip')) return;
    lpCount++;
    if (lpCount > 1){ cancelLP(); return; }   /* pinch = not a long press */
    lpId = ev.pointerId;
    lpStart = { x:ev.clientX, y:ev.clientY };
    lpTimer = setTimeout(function(){
      lpTimer = null;
      var rect = wrap.getBoundingClientRect();
      var px = lpStart.x - rect.left, py = lpStart.y - rect.top;
      var lnglat = screenToLngLat(px, py);
      if (lnglat) dropPin(lnglat.lng, lnglat.lat, px, py);
      lpStart = null;
    }, 550);
  }, true);
  wrap.addEventListener('pointermove', function(ev){
    if (!lpStart || ev.pointerId !== lpId) return;
    if (Math.hypot(ev.clientX - lpStart.x, ev.clientY - lpStart.y) > 12) cancelLP();
  }, true);
  wrap.addEventListener('pointerup', function(ev){
    lpCount = Math.max(0, lpCount - 1);
    if (ev.pointerId === lpId) cancelLP();
  }, true);
  wrap.addEventListener('pointercancel', function(ev){
    lpCount = Math.max(0, lpCount - 1);
    if (ev.pointerId === lpId) cancelLP();
  }, true);
})();

/* screen point (within #mapWrap) -> lng/lat in whichever mode is live */
function screenToLngLat(px, py){
  if (map){
    try{
      var ll = map.unproject([px, py]);
      return { lng: ll.lng, lat: ll.lat };
    }catch(e){ logDiag('unproject failed: ' + e.message, 'err'); return null; }
  }
  /* ghost mode: centre of view is target; convert px offset via m/px */
  var mpp = 156543 * Math.cos(target.lat * Math.PI / 180) / Math.pow(2, target.zoom + 8) * 256;
  var r = gcvs.parentElement.getBoundingClientRect();
  var dxm = (px - r.width / 2) * mpp;
  var dym = (r.height / 2 - py) * mpp;
  var b = target.bearing * Math.PI / 180;
  var east  = dxm * Math.cos(b) + dym * Math.sin(b);
  var north = -dxm * Math.sin(b) + dym * Math.cos(b);
  return {
    lng: target.lng + east / (111320 * Math.cos(target.lat * Math.PI / 180)),
    lat: target.lat + north / 110540
  };
}

function showGeoNote(msg, ms){
  var n = document.getElementById('geoNote');
  n.textContent = msg;
  n.classList.add('show');
  clearTimeout(showGeoNote._t);
  showGeoNote._t = setTimeout(function(){ n.classList.remove('show'); }, ms || 3600);
}

function fmtCoord(lat, lng){
  var ns = lat >= 0 ? 'N' : 'S', ew = lng >= 0 ? 'E' : 'W';
  return Math.abs(lat).toFixed(4) + '\u00B0 ' + ns + '  \u00B7  ' + Math.abs(lng).toFixed(4) + '\u00B0 ' + ew;
}
var realmNameEl = document.getElementById('realmName');
function updateHUD(){
  document.getElementById('coordText').textContent = fmtCoord(target.lat, target.lng);
  document.getElementById('compassRose').style.transform = 'rotate(' + (-target.bearing) + 'deg)';
  var cx = Math.floor(target.lng * 50), cy = Math.floor(target.lat * 50);
  var key = cx + ',' + cy;
  if (key !== realmCell){
    realmCell = key;
    realmNameEl.classList.add('fading');
    setTimeout(function(){
      realmNameEl.textContent = realmNameFor(cx, cy);
      realmNameEl.classList.remove('fading');
    }, 260);
  }
}

/* ============================================================
   2. THE VISTA — boots immediately, independent of the map
   ============================================================ */
var cvs = document.getElementById('vista');
var ctx = cvs.getContext('2d');
var W = 0, H = 0, DPR = 1, starCvs = null;

function resizeVista(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  var r = cvs.parentElement.getBoundingClientRect();
  W = Math.max(1, Math.round(r.width));
  H = Math.max(1, Math.round(r.height));
  cvs.width = W * DPR; cvs.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildStars();
}
function buildStars(){
  starCvs = document.createElement('canvas');
  starCvs.width = (W + 120) * DPR; starCvs.height = H * DPR;
  var s = starCvs.getContext('2d');
  s.setTransform(DPR, 0, 0, DPR, 0, 0);
  var rng = mulberry32(0x57A2);
  var n = Math.floor((W + 120) * H / 2600);
  for (var i = 0; i < n; i++){
    var x = rng() * (W + 120), y = rng() * H * .72, rr = rng();
    s.fillStyle = rr > .9 ? 'rgba(246,223,164,.95)' : 'rgba(239,230,208,' + (0.25 + rng() * .5) + ')';
    s.beginPath(); s.arc(x, y, rr > .9 ? 1.4 : .7, 0, 7); s.fill();
  }
}
window.addEventListener('resize', function(){ resizeVista(); resizeGhost(); });

function worldOffsets(){
  var latR = target.lat * Math.PI / 180;
  var wx = target.lng * 111320 * Math.cos(latR);
  var wy = target.lat * 110540;
  var b = target.bearing * Math.PI / 180;
  return {
    lateral:  wx * Math.cos(b) + wy * Math.sin(b),
    forward: -wx * Math.sin(b) + wy * Math.cos(b),
    zScale: Math.min(6, Math.max(.3, Math.pow(2, target.zoom - 15)))
  };
}

function drawSpire(g, x, y, h, w, glow){
  g.beginPath();
  g.moveTo(x - w, y); g.lineTo(x, y - h); g.lineTo(x + w, y); g.closePath();
  g.fill();
  if (glow > 0){
    g.save();
    g.fillStyle = 'rgba(227,176,75,' + (0.55 * glow) + ')';
    g.beginPath(); g.arc(x, y - h, 2.2, 0, 7); g.fill();
    g.restore();
  }
}
function drawTower(g, rng, x, y, h, w, litAmt){
  g.fillRect(x - w / 2, y - h, w, h);
  g.beginPath();
  g.moveTo(x - w / 2 - 2, y - h); g.lineTo(x, y - h - w * .9); g.lineTo(x + w / 2 + 2, y - h);
  g.closePath(); g.fill();
  var rows = Math.max(1, Math.floor(h / 14));
  g.save();
  for (var r = 0; r < rows; r++){
    if (rng() < litAmt){
      g.fillStyle = rng() < .3 ? 'rgba(217,96,58,.8)' : 'rgba(227,176,75,.8)';
      g.fillRect(x - w / 2 + 2 + rng() * (w - 6), y - h + 6 + r * 14, 2.5, 3.5);
    }
  }
  g.restore();
}
function drawCrystal(g, x, y, h, w){
  g.save();
  g.fillStyle = 'rgba(107,79,163,.85)';
  g.beginPath();
  g.moveTo(x, y - h); g.lineTo(x + w * .6, y - h * .45);
  g.lineTo(x + w * .3, y); g.lineTo(x - w * .3, y);
  g.lineTo(x - w * .6, y - h * .45); g.closePath();
  g.fill();
  g.strokeStyle = 'rgba(227,176,75,.4)'; g.lineWidth = .8; g.stroke();
  g.fillStyle = 'rgba(246,223,164,.5)';
  g.beginPath(); g.arc(x, y - h, 1.8, 0, 7); g.fill();
  g.restore();
}
function drawGiantTree(g, rng, x, y, h, w){
  g.save();
  g.fillStyle = 'rgba(20,14,34,.95)';
  g.fillRect(x - w * .12, y - h * .55, w * .24, h * .55);
  g.fillStyle = 'rgba(58,44,96,.92)';
  for (var i = 0; i < 3; i++){
    var cy = y - h * (.5 + i * .18), cr = w * (0.55 - i * .12);
    g.beginPath(); g.arc(x + (rng() - .5) * 4, cy, cr, 0, 7); g.fill();
  }
  g.fillStyle = 'rgba(227,176,75,.55)';
  for (var j = 0; j < 5; j++){
    g.beginPath();
    g.arc(x + (rng() - .5) * w, y - h * (.5 + rng() * .4), .9, 0, 7);
    g.fill();
  }
  g.restore();
}
function drawIsland(g, rng, x, y, s){
  g.save();
  g.fillStyle = 'rgba(29,23,53,.9)';
  g.beginPath(); g.ellipse(x, y, s, s * .32, 0, 0, 7); g.fill();
  g.beginPath();
  g.moveTo(x - s * .7, y + s * .1); g.lineTo(x - s * .2, y + s * 1.1);
  g.lineTo(x + s * .35, y + s * .15); g.closePath(); g.fill();
  g.fillStyle = 'rgba(36,27,63,.95)';
  drawSpire(g, x - s * .2, y - s * .05, s * .8, s * .16, 1);
  if (rng() < .6) drawSpire(g, x + s * .35, y - s * .02, s * .5, s * .1, 1);
  g.strokeStyle = 'rgba(227,176,75,.28)'; g.lineWidth = .8;
  g.beginPath(); g.ellipse(x, y, s, s * .32, 0, Math.PI, 0); g.stroke();
  g.restore();
}

function drawBand(g, opts){
  g.fillStyle = opts.color;
  g.beginPath();
  g.moveTo(-4, H);
  for (var x = -4; x <= W + 4; x += 6){
    g.lineTo(x, opts.baseY - fbm((x + opts.off) / opts.wl, opts.seed) * opts.amp);
  }
  g.lineTo(W + 4, H);
  g.closePath();
  g.fill();

  if (!opts.structures) return;
  var c0 = Math.floor((opts.off - 60) / opts.cell), c1 = Math.floor((opts.off + W + 60) / opts.cell);
  for (var c = c0; c <= c1; c++){
    var rng = mulberry32((c * 2654435761) ^ opts.seed);
    var sx = c * opts.cell - opts.off + rng() * opts.cell * .6;
    if (sx < -50 || sx > W + 50) continue;
    var gy = opts.baseY - fbm((sx + opts.off) / opts.wl, opts.seed) * opts.amp + 2;
    var roll = rng();
    var density = .12 + sceneCur.urban * .55;
    var treeDensity = .08 + sceneCur.forest * .5;
    if (roll < density){
      var kind = rng();
      g.fillStyle = opts.structColor;
      if (kind < .38) drawSpire(g, sx, gy, 26 + rng() * 46 * (1 + sceneCur.urban), 5 + rng() * 5, rng());
      else if (kind < .72) drawTower(g, rng, sx, gy, 22 + rng() * 40 * (1 + sceneCur.urban * .8), 9 + rng() * 8, .25 + sceneCur.urban * .6);
      else drawCrystal(g, sx, gy, 18 + rng() * 26, 8 + rng() * 6);
    } else if (roll < density + treeDensity){
      drawGiantTree(g, rng, sx, gy, 24 + rng() * 30, 14 + rng() * 12);
    }
  }
}

var embers = [];
function spawnEmber(){
  embers.push({
    x: Math.random() * W, y: H + 6,
    vy: -(8 + Math.random() * 20) / 60,
    vx: 0, life: 1, size: .8 + Math.random() * 1.6,
    hot: Math.random() < .5
  });
}

var t0 = performance.now();
function frame(now){
  var dt = Math.min(50, now - t0) / 1000; t0 = now;
  var time = now / 1000;

  var wo = worldOffsets();
  cur.lateral = lerp(cur.lateral, wo.lateral, .10);
  cur.forward = lerp(cur.forward, wo.forward, .10);
  cur.zScale  = lerp(cur.zScale,  wo.zScale,  .06);
  cur.bearing = lerp(cur.bearing, target.bearing, .12);
  for (var k in scene) sceneCur[k] = lerp(sceneCur[k], scene[k], .05);

  windVX = lerp(windVX, (cur.lateral - lastLateral) * -0.6, .2);
  lastLateral = cur.lateral;

  var horizon = H * .60;
  var px = 0.06 * cur.zScale;
  var drift = reduceMotion ? 0 : time;

  /* SKY */
  var sky = ctx.createLinearGradient(0, 0, 0, horizon * 1.25);
  sky.addColorStop(0, '#0a0710');
  sky.addColorStop(.45, '#181231');
  sky.addColorStop(.8, '#31204a');
  sky.addColorStop(1, 'rgba(217,96,58,.42)');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  if (starCvs){
    var shift = ((cur.bearing * 1.6) % 120 + 120) % 120;
    ctx.globalAlpha = .9;
    ctx.drawImage(starCvs, shift * DPR, 0, W * DPR, H * DPR, 0, 0, W, H);
    ctx.globalAlpha = 1;
  }

  if (!reduceMotion){
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (var a = 0; a < 2; a++){
      var period = a === 0 ? 7.3 : 11.7;
      var yBase = horizon * (.22 + a * .14);
      var agrad = ctx.createLinearGradient(0, yBase - 30, 0, yBase + 30);
      agrad.addColorStop(0, 'rgba(107,79,163,0)');
      agrad.addColorStop(.5, a === 0 ? 'rgba(107,79,163,.16)' : 'rgba(142,163,199,.10)');
      agrad.addColorStop(1, 'rgba(107,79,163,0)');
      ctx.fillStyle = agrad;
      ctx.beginPath();
      ctx.moveTo(0, yBase);
      for (var ax = 0; ax <= W; ax += 12){
        ctx.lineTo(ax, yBase + Math.sin(ax * .012 + drift * (6.28 / period) + a * 2) * 16);
      }
      ctx.lineTo(W, yBase + 34); ctx.lineTo(0, yBase + 34);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  /* twin moons */
  var moonShift = cur.bearing * .5;
  ctx.save();
  var mg = ctx.createRadialGradient(W * .74 - moonShift, horizon * .28, 2, W * .74 - moonShift, horizon * .28, 46);
  mg.addColorStop(0, 'rgba(246,223,164,.95)');
  mg.addColorStop(.35, 'rgba(227,176,75,.5)');
  mg.addColorStop(1, 'rgba(227,176,75,0)');
  ctx.fillStyle = mg; ctx.fillRect(0, 0, W, horizon);
  ctx.fillStyle = '#f2e3bd';
  ctx.beginPath(); ctx.arc(W * .74 - moonShift, horizon * .28, 15, 0, 7); ctx.fill();
  mg = ctx.createRadialGradient(W * .2 - moonShift * 1.4, horizon * .16, 1, W * .2 - moonShift * 1.4, horizon * .16, 22);
  mg.addColorStop(0, 'rgba(217,96,58,.8)');
  mg.addColorStop(1, 'rgba(217,96,58,0)');
  ctx.fillStyle = mg; ctx.fillRect(0, 0, W, horizon);
  ctx.fillStyle = '#d9784f';
  ctx.beginPath(); ctx.arc(W * .2 - moonShift * 1.4, horizon * .16, 6, 0, 7); ctx.fill();
  ctx.restore();

  /* far mountains */
  drawBand(ctx, {
    off: cur.lateral * px * .10 + cur.forward * px * .03,
    seed: 0xA11CE, baseY: horizon, amp: horizon * .42, wl: 150,
    color: '#150f28', cell: 130, structures: false
  });

  /* floating islands */
  var ioff = cur.lateral * px * .22 + cur.forward * px * .06;
  var icell = 260;
  var ic0 = Math.floor((ioff - 100) / icell), ic1 = Math.floor((ioff + W + 100) / icell);
  for (var ic = ic0; ic <= ic1; ic++){
    var irng = mulberry32((ic * 40503) ^ 0xF10A7);
    if (irng() < .34){
      var isx = ic * icell - ioff + irng() * icell * .7;
      var isy = horizon * (.24 + irng() * .3);
      drawIsland(ctx, irng, isx, isy, 20 + irng() * 26);
    }
  }

  /* mid ridge with citadels */
  drawBand(ctx, {
    off: cur.lateral * px * .32 + cur.forward * px * .10,
    seed: 0xB227, baseY: horizon + H * .05, amp: horizon * .3, wl: 95,
    color: '#1d1735', structColor: 'rgba(24,18,44,.96)',
    cell: 92, structures: true
  });

  /* mist sea */
  if (sceneCur.water > .02){
    var my = horizon + H * .02;
    var wgrad = ctx.createLinearGradient(0, my - 26, 0, my + 44);
    wgrad.addColorStop(0, 'rgba(142,163,199,0)');
    wgrad.addColorStop(.5, 'rgba(142,163,199,' + (0.34 * sceneCur.water) + ')');
    wgrad.addColorStop(1, 'rgba(142,163,199,0)');
    ctx.fillStyle = wgrad;
    ctx.fillRect(0, my - 26, W, 74);
  }

  /* near hills */
  drawBand(ctx, {
    off: cur.lateral * px * .7 + cur.forward * px * .22,
    seed: 0xC33D, baseY: H * .82, amp: H * .17, wl: 70,
    color: '#241b3f', structColor: 'rgba(16,11,30,.98)',
    cell: 78, structures: true
  });

  /* leyline road */
  if (sceneCur.road > .05){
    var loff = cur.lateral * px * .7;
    var la = Math.min(.9, sceneCur.road);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.lineCap = 'round';
    var bendSeed = 0xD00D;
    var startX = W / 2 + (fbm(loff / 90, bendSeed) - .5) * 60;
    var topX = W / 2 + (fbm(loff / 400, bendSeed) - .5) * W * .5;
    var midX = W / 2 + (fbm(loff / 190 + 3.7, bendSeed) - .5) * W * .8;
    for (var pass = 0; pass < 2; pass++){
      ctx.strokeStyle = pass === 0
        ? 'rgba(227,176,75,' + (la * .16) + ')'
        : 'rgba(246,223,164,' + (la * .6) + ')';
      ctx.lineWidth = pass === 0 ? 26 : 3;
      ctx.beginPath();
      ctx.moveTo(startX, H + 8);
      ctx.quadraticCurveTo(midX, H * .86, topX, horizon + H * .055);
      ctx.stroke();
    }
    if (!reduceMotion){
      var flow = ((cur.forward * px * .12 + time * 24) % 60 + 60) % 60;
      ctx.fillStyle = 'rgba(246,223,164,' + (la * .8) + ')';
      for (var d = flow; d < 100; d += 30){
        var tt = d / 100;
        var xx = (1 - tt) * (1 - tt) * startX + 2 * (1 - tt) * tt * midX + tt * tt * topX;
        var yy = (1 - tt) * (1 - tt) * (H + 8) + 2 * (1 - tt) * tt * (H * .86) + tt * tt * (horizon + H * .055);
        ctx.beginPath(); ctx.arc(xx, yy, 2.4 * (1 - tt * .6), 0, 7); ctx.fill();
      }
    }
    ctx.restore();
  }

  /* WAYSTONE BEACON — a pillar of light where the pin stands.
     Screen x from bearing-to-pin relative to view; size from distance. */
  if (pin){
    var pd = pinDelta();
    var FOV = 70;                                   /* degrees to screen edge */
    var inView = Math.abs(pd.rel) <= FOV;
    var intensity = Math.max(.18, Math.min(1, 1 - pd.dist / 3000));
    var bob = reduceMotion ? 0 : Math.sin(time * 1.9) * 3;

    if (inView){
      var bx = W / 2 + (pd.rel / FOV) * (W / 2 - 14);
      var groundY = horizon + H * .04;
      var pillarH = (H * .16 + H * .30 * intensity);

      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      /* light pillar */
      var pg = ctx.createLinearGradient(0, groundY - pillarH, 0, groundY);
      pg.addColorStop(0, 'rgba(246,223,164,0)');
      pg.addColorStop(.55, 'rgba(227,176,75,' + (.34 * intensity) + ')');
      pg.addColorStop(1, 'rgba(246,223,164,' + (.75 * intensity) + ')');
      ctx.fillStyle = pg;
      var pw = 3 + 9 * intensity;
      ctx.fillRect(bx - pw / 2, groundY - pillarH, pw, pillarH);
      /* halo at base */
      var hg = ctx.createRadialGradient(bx, groundY, 1, bx, groundY, 26 + 30 * intensity);
      hg.addColorStop(0, 'rgba(227,176,75,' + (.5 * intensity) + ')');
      hg.addColorStop(1, 'rgba(227,176,75,0)');
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(bx, groundY, 26 + 30 * intensity, 0, 7); ctx.fill();
      /* floating gem */
      var gy2 = groundY - pillarH - 6 + bob;
      ctx.fillStyle = 'rgba(246,223,164,' + (.7 + .3 * intensity) + ')';
      ctx.save();
      ctx.translate(bx, gy2); ctx.rotate(Math.PI / 4);
      var gs = 3 + 4 * intensity;
      ctx.fillRect(-gs / 2, -gs / 2, gs, gs);
      ctx.restore();
      ctx.restore();
    } else {
      /* off-view: edge chevron at horizon pointing toward the waystone */
      var edgeX = pd.rel > 0 ? W - 16 : 16;
      var dirSign = pd.rel > 0 ? 1 : -1;
      ctx.save();
      ctx.globalAlpha = .55 + (reduceMotion ? 0 : Math.sin(time * 3.1) * .25);
      ctx.strokeStyle = '#e3b04b';
      ctx.lineWidth = 2; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(edgeX - 5 * dirSign, horizon - 8);
      ctx.lineTo(edgeX + 4 * dirSign, horizon);
      ctx.lineTo(edgeX - 5 * dirSign, horizon + 8);
      ctx.stroke();
      ctx.restore();
    }
  }

  /* embers */
  if (!reduceMotion){
    if (embers.length < 42 && Math.random() < .5) spawnEmber();
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (var ei = embers.length - 1; ei >= 0; ei--){
      var e = embers[ei];
      e.vx = lerp(e.vx, windVX * .02, .1);
      e.x += e.vx + Math.sin(time * 2 + ei) * .15;
      e.y += e.vy * 60 * dt;
      e.life -= dt * .22;
      if (e.life <= 0 || e.y < -8){ embers.splice(ei, 1); continue; }
      ctx.fillStyle = e.hot
        ? 'rgba(217,96,58,' + (e.life * .8) + ')'
        : 'rgba(227,176,75,' + (e.life * .7) + ')';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  /* atmosphere */
  var fog = ctx.createLinearGradient(0, horizon - 40, 0, H);
  fog.addColorStop(0, 'rgba(49,32,74,0)');
  fog.addColorStop(1, 'rgba(10,7,16,.55)');
  ctx.fillStyle = fog; ctx.fillRect(0, horizon - 40, W, H - horizon + 40);
  var vig = ctx.createRadialGradient(W / 2, H * .5, H * .35, W / 2, H * .5, H * .95);
  vig.addColorStop(0, 'rgba(10,7,16,0)');
  vig.addColorStop(1, 'rgba(10,7,16,.5)');
  ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

  if (ghostActive) drawGhost(time);
  requestAnimationFrame(frame);
}

resizeVista();
updateHUD();
requestAnimationFrame(frame);
logDiag('vista running', 'ok');

/* ============================================================
   3. GEOLOCATION (independent of map availability)
   ============================================================ */
if (navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    function(pos){
      userPos.lng = pos.coords.longitude;
      userPos.lat = pos.coords.latitude;
      logDiag('geolocation ok: ' + fmtCoord(userPos.lat, userPos.lng), 'ok');
      if (map){
        if (userMarker) userMarker.setLngLat([userPos.lng, userPos.lat]);
        map.jumpTo({ center:[userPos.lng, userPos.lat] });
      } else {
        target.lng = userPos.lng; target.lat = userPos.lat;
        updateHUD();
      }
      showGeoNote('Your position is bound to the realm');
    },
    function(err){
      logDiag('geolocation denied/failed: ' + err.message + ' (code ' + err.code + ')', 'err');
      showGeoNote('Location veiled — showing a distant shore');
    },
    { enableHighAccuracy:true, timeout:8000 }
  );
} else {
  logDiag('navigator.geolocation unavailable', 'err');
  showGeoNote('Location veiled — showing a distant shore');
}

document.getElementById('recenterBtn').addEventListener('click', function(){
  if (map){
    map.flyTo({ center:[userPos.lng, userPos.lat], zoom:15.4, bearing:0, speed:1.4 });
  } else {
    target.lng = userPos.lng; target.lat = userPos.lat;
    target.bearing = 0; target.zoom = 15.4;
    updateHUD();
  }
});

/* ============================================================
   4. MAPLIBRE — async load, multi-CDN fallback, try/catch init
   ============================================================ */
var MAPLIBRE_JS = [
  'https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.js',
  'https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.js',
  'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js'
];
var MAPLIBRE_CSS = [
  'https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css',
  'https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.css',
  'https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css'
];

function loadScriptChain(urls, i){
  i = i || 0;
  return new Promise(function(resolve, reject){
    if (i >= urls.length){ reject(new Error('all script CDNs failed')); return; }
    var s = document.createElement('script');
    s.src = urls[i];
    s.onload = function(){ logDiag('js loaded: ' + urls[i].split('/')[2], 'ok'); resolve(); };
    s.onerror = function(){
      logDiag('js failed: ' + urls[i], 'err');
      loadScriptChain(urls, i + 1).then(resolve, reject);
    };
    document.head.appendChild(s);
  });
}
function loadCssChain(urls, i){
  i = i || 0;
  if (i >= urls.length){ logDiag('all css CDNs failed (non-fatal)', 'err'); return; }
  var l = document.createElement('link');
  l.rel = 'stylesheet';
  l.href = urls[i];
  l.onload = function(){ logDiag('css loaded: ' + urls[i].split('/')[2], 'ok'); };
  l.onerror = function(){ loadCssChain(urls, i + 1); };
  document.head.appendChild(l);
}

var featureDirty = false, lastSample = 0;
function sampleFeatures(){
  if (!map || !map.isStyleLoaded()) return;
  var water = 0, forest = 0, urban = 0, road = 0;
  try{
    var feats = map.queryRenderedFeatures();
    for (var i = 0; i < feats.length; i++){
      var f = feats[i];
      var id = ((f.layer && f.layer.id) || '').toLowerCase();
      var sl = (f.sourceLayer || '').toLowerCase();
      if (id.indexOf('water') >= 0 || sl === 'water') water++;
      else if (id.indexOf('wood') >= 0 || id.indexOf('forest') >= 0 || id.indexOf('grass') >= 0 || id.indexOf('park') >= 0 || sl === 'park') forest++;
      else if (id.indexOf('building') >= 0 || sl === 'building') urban++;
      else if (id.indexOf('transportation') >= 0 || id.indexOf('highway') >= 0 || id.indexOf('road') >= 0 || sl.indexOf('transportation') >= 0) road++;
    }
  }catch(e){ return; }
  scene.water  = Math.min(1, water  / 6);
  scene.forest = Math.min(1, forest / 14);
  scene.urban  = Math.min(1, urban  / 45);
  scene.road   = Math.min(1, road   / 30);
}
setInterval(function(){
  var now = performance.now();
  if (featureDirty && now - lastSample > 480){
    featureDirty = false; lastSample = now;
    sampleFeatures();
  }
}, 240);

function initMap(){
  loadCssChain(MAPLIBRE_CSS);
  loadScriptChain(MAPLIBRE_JS).then(function(){
    if (typeof maplibregl === 'undefined') throw new Error('maplibregl undefined after script load');
    logDiag('maplibre-gl v' + maplibregl.version);

    map = new maplibregl.Map({
      container:'map',
      style:'https://tiles.openfreemap.org/styles/liberty',
      center:[target.lng, target.lat],
      zoom:target.zoom,
      pitch:0,
      attributionControl:{ compact:true },
      dragRotate:true,
      touchPitch:false
    });

    map.on('error', function(e){
      logDiag('map error: ' + ((e.error && e.error.message) || 'unknown'), 'err');
    });

    var markerEl = document.createElement('div');
    markerEl.className = 'rune-marker';
    markerEl.innerHTML = '<div class="ring"></div><div class="ring"></div><div class="core"></div>';
    userMarker = new maplibregl.Marker({ element:markerEl })
      .setLngLat([userPos.lng, userPos.lat]).addTo(map);

    map.on('move', function(){
      var c = map.getCenter();
      target.lng = c.lng; target.lat = c.lat;
      target.bearing = map.getBearing();
      target.zoom = map.getZoom();
      updateHUD();
      featureDirty = true;
    });

    map.on('load', function(){
      mapReady = true;
      logDiag('map style loaded', 'ok');
      sampleFeatures();
      var toast = document.getElementById('hintToast');
      toast.classList.add('show');
      setTimeout(function(){ toast.classList.remove('show'); }, 4200);
    });
  }).catch(function(err){
    logDiag('map init failed: ' + err.message, 'err');
    enableGhostMap();
  });
}
try{ initMap(); }catch(e){ logDiag('map init threw: ' + e.message, 'err'); enableGhostMap(); }

/* ============================================================
   5. GHOST MAP — touch-drag fallback if MapLibre never loads
   ============================================================ */
var ghostActive = false;
var gcvs = document.getElementById('ghostMap');
var gctx = gcvs.getContext('2d');
var GW = 0, GH = 0;

function resizeGhost(){
  var r = gcvs.parentElement.getBoundingClientRect();
  GW = Math.max(1, Math.round(r.width));
  GH = Math.max(1, Math.round(r.height));
  gcvs.width = GW * DPR; gcvs.height = GH * DPR;
  gctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

function enableGhostMap(){
  if (ghostActive) return;
  ghostActive = true;
  gcvs.style.display = 'block';
  document.getElementById('map').style.display = 'none';
  document.getElementById('mapLabel').textContent = 'Ghost Cartography \u00B7 offline';
  resizeGhost();
  showGeoNote('Cartography unreachable — drag here to wander the realm', 5200);

  var wrap = document.getElementById('mapWrap');
  var pointers = {};
  var pinchDist = 0;

  function metersPerPx(){
    return 156543 * Math.cos(target.lat * Math.PI / 180) / Math.pow(2, target.zoom + 8) * 256;
  }
  wrap.addEventListener('pointerdown', function(ev){
    if (ev.target.closest('.recenter') || ev.target.closest('.diag-btn') || ev.target.closest('.diag-panel')) return;
    pointers[ev.pointerId] = { x:ev.clientX, y:ev.clientY };
    wrap.setPointerCapture(ev.pointerId);
  });
  wrap.addEventListener('pointermove', function(ev){
    if (!pointers[ev.pointerId]) return;
    var ids = Object.keys(pointers);
    if (ids.length === 1){
      var p = pointers[ev.pointerId];
      var dx = ev.clientX - p.x, dy = ev.clientY - p.y;
      var mpp = metersPerPx();
      var b = target.bearing * Math.PI / 180;
      var east  = (-dx * Math.cos(b) + dy * Math.sin(b)) * mpp;
      var north = ( dy * Math.cos(b) + dx * Math.sin(b)) * mpp;
      target.lng += east  / (111320 * Math.cos(target.lat * Math.PI / 180));
      target.lat += north / 110540;
      target.lat = Math.max(-85, Math.min(85, target.lat));
      updateHUD();
    } else if (ids.length === 2){
      var a = pointers[ids[0]], b2 = pointers[ids[1]];
      if (String(ev.pointerId) === ids[0]) a = { x:ev.clientX, y:ev.clientY };
      else b2 = { x:ev.clientX, y:ev.clientY };
      var d = Math.hypot(a.x - b2.x, a.y - b2.y);
      if (pinchDist > 0){
        target.zoom = Math.max(11, Math.min(18, target.zoom + (d - pinchDist) * .01));
        updateHUD();
      }
      pinchDist = d;
    }
    pointers[ev.pointerId] = { x:ev.clientX, y:ev.clientY };
  });
  function endPointer(ev){
    delete pointers[ev.pointerId];
    if (Object.keys(pointers).length < 2) pinchDist = 0;
  }
  wrap.addEventListener('pointerup', endPointer);
  wrap.addEventListener('pointercancel', endPointer);
}

function drawGhost(time){
  gctx.fillStyle = '#131022';
  gctx.fillRect(0, 0, GW, GH);
  var mpp = 156543 * Math.cos(target.lat * Math.PI / 180) / Math.pow(2, target.zoom + 8) * 256;
  var gridM = 100;
  var gridPx = gridM / mpp;
  while (gridPx < 34){ gridM *= 2; gridPx = gridM / mpp; }
  while (gridPx > 110){ gridM /= 2; gridPx = gridM / mpp; }
  var wxm = target.lng * 111320 * Math.cos(target.lat * Math.PI / 180);
  var wym = target.lat * 110540;
  var offX = (wxm / gridM % 1 + 1) % 1 * gridPx;
  var offY = (wym / gridM % 1 + 1) % 1 * gridPx;

  gctx.strokeStyle = 'rgba(227,176,75,.12)';
  gctx.lineWidth = 1;
  for (var gx = -offX; gx <= GW; gx += gridPx){
    gctx.beginPath(); gctx.moveTo(gx, 0); gctx.lineTo(gx, GH); gctx.stroke();
  }
  for (var gy = GH + offY; gy >= 0; gy -= gridPx){
    gctx.beginPath(); gctx.moveTo(0, gy); gctx.lineTo(GW, gy); gctx.stroke();
  }

  /* seeded district sigils so the ghost map has landmarks to steer by */
  var cellM = gridM * 3;
  var cellPx = cellM / mpp;
  var c0x = Math.floor((wxm - GW / 2 * mpp) / cellM), c1x = Math.floor((wxm + GW / 2 * mpp) / cellM);
  var c0y = Math.floor((wym - GH / 2 * mpp) / cellM), c1y = Math.floor((wym + GH / 2 * mpp) / cellM);
  for (var cx = c0x; cx <= c1x; cx++){
    for (var cy = c0y; cy <= c1y; cy++){
      var rng = mulberry32((cx * 73856093) ^ (cy * 19349663) ^ 0x6057);
      if (rng() > .4) continue;
      var sxp = GW / 2 + ((cx + .5) * cellM - wxm) / mpp;
      var syp = GH / 2 - ((cy + .5) * cellM - wym) / mpp;
      var rr = 6 + rng() * Math.min(26, cellPx * .2);
      gctx.strokeStyle = 'rgba(107,79,163,.4)';
      gctx.beginPath(); gctx.arc(sxp, syp, rr, 0, 7); gctx.stroke();
      gctx.fillStyle = 'rgba(227,176,75,.5)';
      gctx.beginPath(); gctx.arc(sxp, syp, 1.6, 0, 7); gctx.fill();
    }
  }

  /* waystone pin */
  if (pin){
    var pWx = pin.lng * 111320 * Math.cos(target.lat * Math.PI / 180);
    var pWy = pin.lat * 110540;
    var pxp = GW / 2 + (pWx - wxm) / mpp;
    var pyp = GH / 2 - (pWy - wym) / mpp;
    if (pxp > -30 && pxp < GW + 30 && pyp > -30 && pyp < GH + 30){
      var wp = reduceMotion ? .5 : (Math.sin(time * 2.1) * .5 + .5);
      gctx.strokeStyle = 'rgba(227,176,75,' + (.4 + wp * .4) + ')';
      gctx.lineWidth = 1.2;
      gctx.beginPath(); gctx.arc(pxp, pyp, 8 + wp * 4, 0, 7); gctx.stroke();
      gctx.save();
      gctx.translate(pxp, pyp); gctx.rotate(Math.PI / 4);
      gctx.fillStyle = '#e3b04b';
      gctx.fillRect(-4, -4, 8, 8);
      gctx.strokeStyle = 'rgba(246,223,164,.9)';
      gctx.strokeRect(-4, -4, 8, 8);
      gctx.restore();
    }
  }

  /* wayfarer at centre */
  var pulse = reduceMotion ? .5 : (Math.sin(time * 2.4) * .5 + .5);
  gctx.strokeStyle = 'rgba(227,176,75,' + (0.5 + pulse * .4) + ')';
  gctx.lineWidth = 1.5;
  gctx.beginPath(); gctx.arc(GW / 2, GH / 2, 9 + pulse * 5, 0, 7); gctx.stroke();
  gctx.fillStyle = '#f6dfa4';
  gctx.beginPath(); gctx.arc(GW / 2, GH / 2, 3.4, 0, 7); gctx.fill();
}
</script>
