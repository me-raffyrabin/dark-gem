<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0710" />
<title>Veilwalker — The Realm Above</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<link href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/3.6.2/maplibre-gl.min.css" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/3.6.2/maplibre-gl.min.js"></script>

<style>
  :root{
    --void:#0a0710;
    --deep:#131022;
    --midnight:#1d1735;
    --gold:#e3b04b;
    --ember:#d9603a;
    --arcane:#6b4fa3;
    --mist:#8ea3c7;
    --parchment:#efe6d0;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; background:var(--void); }
  body{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--parchment);
    height:100dvh;
    display:grid;
    grid-template-rows:1fr 1fr;
    position:relative;
  }

  /* ---------- TOP: the Realm vista ---------- */
  #vistaWrap{ position:relative; overflow:hidden; background:var(--void); }
  #vista{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  .hud{ position:absolute; z-index:5; pointer-events:none; }

  .realm-chip{
    top:calc(env(safe-area-inset-top, 0px) + 12px); left:14px;
    display:flex; flex-direction:column; gap:1px;
    padding:8px 14px 9px;
    background:linear-gradient(160deg, rgba(19,16,34,.82), rgba(10,7,16,.65));
    border:1px solid rgba(227,176,75,.35);
    border-radius:3px;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    box-shadow:0 4px 18px rgba(0,0,0,.5), inset 0 0 12px rgba(227,176,75,.06);
  }
  .realm-chip .eyebrow{
    font-size:9px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--mist); font-weight:500;
  }
  .realm-chip .name{
    font-family:'Cormorant Garamond',serif;
    font-size:21px; font-weight:600; line-height:1.1;
    color:var(--gold);
    text-shadow:0 0 14px rgba(227,176,75,.35);
    transition:opacity .5s ease;
  }
  .realm-chip .name.fading{ opacity:0; }

  .compass{
    top:calc(env(safe-area-inset-top, 0px) + 12px); right:14px;
    width:52px; height:52px;
  }
  .compass svg{ width:100%; height:100%; overflow:visible; }
  #compassRose{ transform-origin:50% 50%; transition:transform .12s linear; }

  .coord-bar{
    left:50%; bottom:26px; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px;
    padding:6px 16px;
    background:rgba(10,7,16,.6);
    border:1px solid rgba(227,176,75,.25);
    border-radius:2px;
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    font-size:10.5px; letter-spacing:.14em; font-weight:500;
    color:var(--parchment); white-space:nowrap;
  }
  .coord-bar .rune{ color:var(--gold); font-size:9px; }

  .hint-toast{
    left:50%; top:50%; transform:translate(-50%,-50%);
    padding:10px 20px;
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:16px; color:var(--parchment);
    background:rgba(10,7,16,.55);
    border:1px solid rgba(227,176,75,.3);
    border-radius:2px;
    backdrop-filter:blur(5px);
    -webkit-backdrop-filter:blur(5px);
    opacity:0; transition:opacity 1s ease;
    text-align:center; max-width:78%;
  }
  .hint-toast.show{ opacity:1; }

  /* ---------- DIVIDER: the Threshold ---------- */
  .threshold{
    position:absolute; left:0; right:0; top:50%;
    height:0; z-index:20; pointer-events:none;
  }
  .threshold .bar{
    position:absolute; left:0; right:0; top:-2px; height:4px;
    background:linear-gradient(90deg,
      transparent, rgba(227,176,75,.15) 12%,
      var(--gold) 46%, #f6dfa4 50%, var(--gold) 54%,
      rgba(227,176,75,.15) 88%, transparent);
    box-shadow:0 0 16px rgba(227,176,75,.5), 0 0 46px rgba(217,96,58,.25);
  }
  .threshold .gem{
    position:absolute; left:50%; top:0; transform:translate(-50%,-50%) rotate(45deg);
    width:16px; height:16px;
    background:linear-gradient(135deg, #f6dfa4, var(--gold) 55%, var(--ember));
    border:1px solid rgba(246,223,164,.9);
    box-shadow:0 0 18px rgba(227,176,75,.85), 0 0 44px rgba(217,96,58,.5);
    animation:gemPulse 4.7s ease-in-out infinite;
  }
  @keyframes gemPulse{
    0%,100%{ box-shadow:0 0 14px rgba(227,176,75,.7), 0 0 34px rgba(217,96,58,.35); }
    50%{ box-shadow:0 0 26px rgba(227,176,75,1), 0 0 64px rgba(217,96,58,.6); }
  }

  /* ---------- BOTTOM: the mortal map ---------- */
  #mapWrap{ position:relative; overflow:hidden; background:var(--deep); }
  #map{ position:absolute; inset:0; }
  /* alchemical dark transmutation of the base cartography */
  #map .maplibregl-canvas{
    filter:invert(.92) hue-rotate(205deg) saturate(.55) brightness(.82) contrast(1.08);
  }
  .map-tint{
    position:absolute; inset:0; pointer-events:none; z-index:2;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(227,176,75,.10), transparent 55%),
      radial-gradient(140% 110% at 50% 115%, rgba(107,79,163,.18), transparent 60%);
    mix-blend-mode:screen;
  }
  .map-vignette{
    position:absolute; inset:0; pointer-events:none; z-index:2;
    box-shadow:inset 0 0 90px rgba(10,7,16,.9);
  }

  .maplibregl-ctrl-attrib{
    background:rgba(10,7,16,.55)!important;
    font-size:9px!important;
  }
  .maplibregl-ctrl-attrib a{ color:var(--mist)!important; }

  .recenter{
    position:absolute; right:14px;
    bottom:calc(env(safe-area-inset-bottom, 0px) + 22px);
    z-index:6;
    width:46px; height:46px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg, rgba(29,23,53,.92), rgba(10,7,16,.88));
    border:1px solid rgba(227,176,75,.5);
    border-radius:50%;
    color:var(--gold);
    box-shadow:0 4px 16px rgba(0,0,0,.6), inset 0 0 10px rgba(227,176,75,.08);
    cursor:pointer;
  }
  .recenter:active{ transform:scale(.93); }
  .recenter svg{ width:20px; height:20px; }

  .map-label{
    position:absolute; left:14px;
    bottom:calc(env(safe-area-inset-bottom, 0px) + 24px);
    z-index:6; pointer-events:none;
    font-size:9px; letter-spacing:.24em; text-transform:uppercase;
    color:var(--mist); font-weight:500;
    display:flex; align-items:center; gap:8px;
  }
  .map-label::before{
    content:""; width:22px; height:1px;
    background:linear-gradient(90deg, var(--gold), transparent);
  }

  /* user rune marker */
  .rune-marker{ width:26px; height:26px; position:relative; }
  .rune-marker .core{
    position:absolute; inset:7px;
    background:radial-gradient(circle, #f6dfa4 0%, var(--gold) 55%, var(--ember) 100%);
    border-radius:50%;
    box-shadow:0 0 12px rgba(227,176,75,.9);
  }
  .rune-marker .ring{
    position:absolute; inset:0; border:1.5px solid var(--gold);
    border-radius:50%;
    animation:runePulse 2.6s ease-out infinite;
  }
  .rune-marker .ring:nth-child(2){ animation-delay:1.3s; }
  @keyframes runePulse{
    0%{ transform:scale(.5); opacity:1; }
    100%{ transform:scale(2.4); opacity:0; }
  }

  .geo-note{
    position:absolute; left:50%; top:14px; transform:translateX(-50%);
    z-index:6; padding:6px 14px;
    font-size:10px; letter-spacing:.08em; color:var(--mist);
    background:rgba(10,7,16,.7);
    border:1px solid rgba(142,163,199,.3);
    border-radius:2px;
    opacity:0; transition:opacity .6s ease;
    pointer-events:none; white-space:nowrap;
  }
  .geo-note.show{ opacity:1; }

  @media (prefers-reduced-motion: reduce){
    .threshold .gem{ animation:none; }
    .rune-marker .ring{ animation:none; opacity:.4; transform:scale(1.4); }
  }
</style>
</head>
<body>

  <!-- TOP HALF — the Realm -->
  <section id="vistaWrap" aria-label="Fantasy realm view">
    <canvas id="vista"></canvas>

    <div class="hud realm-chip">
      <span class="eyebrow">Realm sighted</span>
      <span class="name" id="realmName">The Veiled Reach</span>
    </div>

    <div class="hud compass" aria-hidden="true">
      <svg viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="24" fill="rgba(10,7,16,.6)" stroke="rgba(227,176,75,.4)" stroke-width="1"/>
        <g id="compassRose">
          <path d="M26 6 L29 24 L26 22 L23 24 Z" fill="#e3b04b"/>
          <path d="M26 46 L29 28 L26 30 L23 28 Z" fill="rgba(142,163,199,.6)"/>
          <circle cx="26" cy="26" r="2.4" fill="#f6dfa4"/>
        </g>
        <text x="26" y="4" text-anchor="middle" font-size="7" fill="#e3b04b" font-family="Inter">N</text>
      </svg>
    </div>

    <div class="hud coord-bar">
      <span class="rune">◆</span>
      <span id="coordText">— · —</span>
      <span class="rune">◆</span>
    </div>

    <div class="hud hint-toast" id="hintToast">
      Drag the map below — the realm above follows your path
    </div>
  </section>

  <!-- THE THRESHOLD -->
  <div class="threshold" aria-hidden="true">
    <div class="bar"></div>
    <div class="gem"></div>
  </div>

  <!-- BOTTOM HALF — the mortal map -->
  <section id="mapWrap" aria-label="Interactive map">
    <div id="map"></div>
    <div class="map-tint"></div>
    <div class="map-vignette"></div>
    <div class="map-label">Mortal Cartography</div>
    <div class="geo-note" id="geoNote"></div>
    <button class="recenter" id="recenterBtn" aria-label="Return to my location">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="12" cy="12" r="7"/>
        <circle cx="12" cy="12" r="2.2" fill="currentColor" stroke="none"/>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
    </button>
  </section>

<script>
/* =====================================================================
   VEILWALKER — split-screen mockup
   Bottom: live MapLibre map (OpenFreeMap vector tiles, dark transmuted)
   Top: procedural fantasy vista, seeded from world position and steered
        by real map features (water, forest, buildings, roads).
   Design canon: void #0a0710 · gold #e3b04b · ember #d9603a
   ===================================================================== */

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- seeded PRNG (mulberry32) + value noise ---------- */
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hash1(i, seed){
  return mulberry32((i * 2654435761) ^ seed)();
}
function smooth(t){ return t * t * (3 - 2 * t); }
function vnoise(x, seed){
  const i = Math.floor(x), f = x - i;
  return hash1(i, seed) * (1 - smooth(f)) + hash1(i + 1, seed) * smooth(f);
}
function fbm(x, seed){
  return vnoise(x, seed) * .55 + vnoise(x * 2.13, seed ^ 0x9e37) * .28 + vnoise(x * 4.7, seed ^ 0x51f2) * .17;
}

/* ---------- realm naming ---------- */
const SYL_A = ['Vor','Ael','Thar','Nym','Kor','Mal','Ish','Dra','Vel','Umb','Cael','Ryn','Orr','Zar','Eth','Syl'];
const SYL_B = ['athel','mar','\u2019dun','ath','oreth','wyn','gard','vaal','iel','myr','\u2019kesh','anor'];
const REALM_KIND = ['Reach of','Vale of','Dominion of','Marches of','Hollow of','Crown of'];
function realmNameFor(cellX, cellY){
  const r = mulberry32((cellX * 73856093) ^ (cellY * 19349663) ^ 0xDA7A);
  const kind = REALM_KIND[Math.floor(r() * REALM_KIND.length)];
  return kind + ' ' + SYL_A[Math.floor(r() * SYL_A.length)] + SYL_B[Math.floor(r() * SYL_B.length)];
}

/* ---------- shared state ---------- */
const FALLBACK = { lng:-71.0589, lat:42.3601 }; // Boston
const target = { lng:FALLBACK.lng, lat:FALLBACK.lat, bearing:0, zoom:15.4 };
const cur = { lateral:0, forward:0, bearing:0, zScale:1 };
const scene = { water:0, forest:0, urban:.4, road:.4 };       // sampled targets
const sceneCur = { water:0, forest:0, urban:.4, road:.4 };    // lerped for render
let windVX = 0, lastLateral = 0;
let realmCell = null;

/* ---------- MAP (bottom half) ---------- */
const map = new maplibregl.Map({
  container:'map',
  style:'https://tiles.openfreemap.org/styles/liberty',
  center:[FALLBACK.lng, FALLBACK.lat],
  zoom:15.4,
  pitch:0,
  attributionControl:{ compact:true },
  dragRotate:true,
  touchPitch:false
});

const markerEl = document.createElement('div');
markerEl.className = 'rune-marker';
markerEl.innerHTML = '<div class="ring"></div><div class="ring"></div><div class="core"></div>';
const userMarker = new maplibregl.Marker({ element:markerEl }).setLngLat([FALLBACK.lng, FALLBACK.lat]).addTo(map);

function showGeoNote(msg, ms){
  const n = document.getElementById('geoNote');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(()=> n.classList.remove('show'), ms || 3200);
}

if (navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { longitude:lng, latitude:lat } = pos.coords;
      userMarker.setLngLat([lng, lat]);
      map.jumpTo({ center:[lng, lat] });
      showGeoNote('Your position is bound to the realm');
    },
    ()  => showGeoNote('Location veiled — showing a distant shore'),
    { enableHighAccuracy:true, timeout:8000 }
  );
} else {
  showGeoNote('Location veiled — showing a distant shore');
}

document.getElementById('recenterBtn').addEventListener('click', () => {
  const ll = userMarker.getLngLat();
  map.flyTo({ center:ll, zoom:15.4, bearing:0, speed:1.4 });
});

/* map movement -> vista state */
function syncFromMap(){
  const c = map.getCenter();
  target.lng = c.lng; target.lat = c.lat;
  target.bearing = map.getBearing();
  target.zoom = map.getZoom();
  updateHUD();
  featureDirty = true;
}
map.on('move', syncFromMap);
map.on('load', () => {
  syncFromMap();
  sampleFeatures();
  const toast = document.getElementById('hintToast');
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 4200);
});

/* ---------- feature sampling: the land shapes the realm ---------- */
let featureDirty = false, lastSample = 0;
function sampleFeatures(){
  if (!map.isStyleLoaded()) return;
  let water = 0, forest = 0, urban = 0, road = 0;
  try{
    const feats = map.queryRenderedFeatures();
    for (const f of feats){
      const id = ((f.layer && f.layer.id) || '').toLowerCase();
      const sl  = (f.sourceLayer || '').toLowerCase();
      if (id.includes('water') || sl === 'water') water++;
      else if (id.includes('wood') || id.includes('forest') || id.includes('grass') || id.includes('park') || sl === 'park') forest++;
      else if (id.includes('building') || sl === 'building') urban++;
      else if (id.includes('transportation') || id.includes('highway') || id.includes('road') || sl.includes('transportation')) road++;
    }
  }catch(e){ /* style mid-load; keep previous scene */ }
  scene.water  = Math.min(1, water  / 6);
  scene.forest = Math.min(1, forest / 14);
  scene.urban  = Math.min(1, urban  / 45);
  scene.road   = Math.min(1, road   / 30);
}
setInterval(() => {
  const now = performance.now();
  if (featureDirty && now - lastSample > 480){
    featureDirty = false; lastSample = now;
    sampleFeatures();
  }
}, 240);

/* ---------- HUD ---------- */
function fmtCoord(lat, lng){
  const ns = lat >= 0 ? 'N' : 'S', ew = lng >= 0 ? 'E' : 'W';
  return Math.abs(lat).toFixed(4) + '\u00B0 ' + ns + '  \u00B7  ' + Math.abs(lng).toFixed(4) + '\u00B0 ' + ew;
}
const realmNameEl = document.getElementById('realmName');
function updateHUD(){
  document.getElementById('coordText').textContent = fmtCoord(target.lat, target.lng);
  document.getElementById('compassRose').style.transform = 'rotate(' + (-target.bearing) + 'deg)';
  const cx = Math.floor(target.lng * 50), cy = Math.floor(target.lat * 50); // ~2 km realm cells
  const key = cx + ',' + cy;
  if (key !== realmCell){
    realmCell = key;
    realmNameEl.classList.add('fading');
    setTimeout(() => {
      realmNameEl.textContent = realmNameFor(cx, cy);
      realmNameEl.classList.remove('fading');
    }, 260);
  }
}

/* =====================================================================
   THE VISTA — procedural fantasy street view (top half)
   ===================================================================== */
const cvs = document.getElementById('vista');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, DPR = 1;
let starCvs = null;

function resize(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  const r = cvs.parentElement.getBoundingClientRect();
  W = Math.max(1, Math.round(r.width));
  H = Math.max(1, Math.round(r.height));
  cvs.width = W * DPR; cvs.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildStars();
}
window.addEventListener('resize', resize);

function buildStars(){
  starCvs = document.createElement('canvas');
  starCvs.width = (W + 120) * DPR; starCvs.height = H * DPR;
  const s = starCvs.getContext('2d');
  s.setTransform(DPR, 0, 0, DPR, 0, 0);
  const rng = mulberry32(0x57A2);
  const n = Math.floor((W + 120) * H / 2600);
  for (let i = 0; i < n; i++){
    const x = rng() * (W + 120), y = rng() * H * .72;
    const rr = rng();
    s.fillStyle = rr > .9 ? 'rgba(246,223,164,.95)' : 'rgba(239,230,208,' + (0.25 + rng() * .5) + ')';
    s.beginPath(); s.arc(x, y, rr > .9 ? 1.4 : .7, 0, 7); s.fill();
  }
}

/* world position -> scroll units */
function worldOffsets(){
  const latR = target.lat * Math.PI / 180;
  const wx = target.lng * 111320 * Math.cos(latR);   // metres east
  const wy = target.lat * 110540;                    // metres north
  const b = target.bearing * Math.PI / 180;
  const lateral =  wx * Math.cos(b) + wy * Math.sin(b);
  const forward = -wx * Math.sin(b) + wy * Math.cos(b);
  const zScale = Math.min(6, Math.max(.3, Math.pow(2, target.zoom - 15)));
  return { lateral, forward, zScale };
}

function lerp(a, b, t){ return a + (b - a) * t; }

/* ---------- structure sprites ---------- */
function drawSpire(g, x, y, h, w, glow){
  g.beginPath();
  g.moveTo(x - w, y); g.lineTo(x, y - h); g.lineTo(x + w, y); g.closePath();
  g.fill();
  if (glow > 0){
    g.save();
    g.fillStyle = 'rgba(227,176,75,' + (0.55 * glow) + ')';
    g.beginPath(); g.arc(x, y - h, 2.2, 0, 7); g.fill();
    g.restore();
  }
}
function drawTower(g, rng, x, y, h, w, litAmt){
  g.fillRect(x - w / 2, y - h, w, h);
  g.beginPath();
  g.moveTo(x - w / 2 - 2, y - h); g.lineTo(x, y - h - w * .9); g.lineTo(x + w / 2 + 2, y - h);
  g.closePath(); g.fill();
  const rows = Math.max(1, Math.floor(h / 14));
  g.save();
  for (let r = 0; r < rows; r++){
    if (rng() < litAmt){
      g.fillStyle = rng() < .3 ? 'rgba(217,96,58,.8)' : 'rgba(227,176,75,.8)';
      g.fillRect(x - w / 2 + 2 + rng() * (w - 6), y - h + 6 + r * 14, 2.5, 3.5);
    }
  }
  g.restore();
}
function drawCrystal(g, x, y, h, w){
  g.save();
  g.fillStyle = 'rgba(107,79,163,.85)';
  g.beginPath();
  g.moveTo(x, y - h); g.lineTo(x + w * .6, y - h * .45);
  g.lineTo(x + w * .3, y); g.lineTo(x - w * .3, y);
  g.lineTo(x - w * .6, y - h * .45); g.closePath();
  g.fill();
  g.strokeStyle = 'rgba(227,176,75,.4)'; g.lineWidth = .8; g.stroke();
  g.fillStyle = 'rgba(246,223,164,.5)';
  g.beginPath(); g.arc(x, y - h, 1.8, 0, 7); g.fill();
  g.restore();
}
function drawGiantTree(g, rng, x, y, h, w){
  g.save();
  g.fillStyle = 'rgba(20,14,34,.95)';
  g.fillRect(x - w * .12, y - h * .55, w * .24, h * .55);
  g.fillStyle = 'rgba(58,44,96,.92)';
  for (let i = 0; i < 3; i++){
    const cy = y - h * (.5 + i * .18), cr = w * (0.55 - i * .12);
    g.beginPath(); g.arc(x + (rng() - .5) * 4, cy, cr, 0, 7); g.fill();
  }
  g.fillStyle = 'rgba(227,176,75,.55)';
  for (let i = 0; i < 5; i++){
    g.beginPath();
    g.arc(x + (rng() - .5) * w, y - h * (.5 + rng() * .4), .9, 0, 7);
    g.fill();
  }
  g.restore();
}
function drawIsland(g, rng, x, y, s){
  g.save();
  g.fillStyle = 'rgba(29,23,53,.9)';
  g.beginPath(); g.ellipse(x, y, s, s * .32, 0, 0, 7); g.fill();
  g.beginPath();
  g.moveTo(x - s * .7, y + s * .1); g.lineTo(x - s * .2, y + s * 1.1);
  g.lineTo(x + s * .35, y + s * .15); g.closePath(); g.fill();
  g.fillStyle = 'rgba(36,27,63,.95)';
  drawSpire(g, x - s * .2, y - s * .05, s * .8, s * .16, 1);
  if (rng() < .6) drawSpire(g, x + s * .35, y - s * .02, s * .5, s * .1, 1);
  g.strokeStyle = 'rgba(227,176,75,.28)'; g.lineWidth = .8;
  g.beginPath(); g.ellipse(x, y, s, s * .32, 0, Math.PI, 0); g.stroke();
  g.restore();
}

/* one parallax terrain band */
function drawBand(g, opts){
  const { off, seed, baseY, amp, wl, color, cell, structures, time } = opts;
  g.fillStyle = color;
  g.beginPath();
  g.moveTo(-4, H);
  for (let x = -4; x <= W + 4; x += 6){
    const wx = (x + off) / wl;
    g.lineTo(x, baseY - fbm(wx, seed) * amp);
  }
  g.lineTo(W + 4, H);
  g.closePath();
  g.fill();

  if (!structures) return;
  const c0 = Math.floor((off - 60) / cell), c1 = Math.floor((off + W + 60) / cell);
  for (let c = c0; c <= c1; c++){
    const rng = mulberry32((c * 2654435761) ^ seed);
    const jitter = rng() * cell * .6;
    const sx = c * cell - off + jitter;
    if (sx < -50 || sx > W + 50) continue;
    const gy = baseY - fbm((sx + off) / wl, seed) * amp + 2;
    const roll = rng();
    const density = .12 + sceneCur.urban * .55;
    const treeDensity = .08 + sceneCur.forest * .5;
    if (roll < density){
      const kind = rng();
      g.fillStyle = opts.structColor;
      if (kind < .38) drawSpire(g, sx, gy, 26 + rng() * 46 * (1 + sceneCur.urban), 5 + rng() * 5, rng());
      else if (kind < .72) drawTower(g, rng, sx, gy, 22 + rng() * 40 * (1 + sceneCur.urban * .8), 9 + rng() * 8, .25 + sceneCur.urban * .6);
      else drawCrystal(g, sx, gy, 18 + rng() * 26, 8 + rng() * 6);
    } else if (roll < density + treeDensity){
      drawGiantTree(g, rng, sx, gy, 24 + rng() * 30, 14 + rng() * 12);
    }
  }
}

/* ember particles */
const embers = [];
function spawnEmber(){
  embers.push({
    x: Math.random() * W, y: H + 6,
    vy: -(8 + Math.random() * 20) / 60,
    vx: 0, life: 1, size: .8 + Math.random() * 1.6,
    hot: Math.random() < .5
  });
}

let t0 = performance.now();
function frame(now){
  const dt = Math.min(50, now - t0) / 1000; t0 = now;
  const time = now / 1000;

  /* smooth toward map state */
  const wo = worldOffsets();
  cur.lateral = lerp(cur.lateral, wo.lateral, .10);
  cur.forward = lerp(cur.forward, wo.forward, .10);
  cur.zScale  = lerp(cur.zScale,  wo.zScale,  .06);
  cur.bearing = lerp(cur.bearing, target.bearing, .12);
  for (const k in scene) sceneCur[k] = lerp(sceneCur[k], scene[k], .05);

  windVX = lerp(windVX, (cur.lateral - lastLateral) * -0.6, .2);
  lastLateral = cur.lateral;

  const horizon = H * .60;
  const px = 0.06 * cur.zScale;                 /* px per metre feel */
  const drift = reduceMotion ? 0 : time;

  /* SKY */
  const sky = ctx.createLinearGradient(0, 0, 0, horizon * 1.25);
  sky.addColorStop(0, '#0a0710');
  sky.addColorStop(.45, '#181231');
  sky.addColorStop(.8, '#31204a');
  sky.addColorStop(1, 'rgba(217,96,58,.42)');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  /* stars: shift with bearing so rotating the map turns the heavens */
  if (starCvs){
    const shift = ((cur.bearing * 1.6) % 120 + 120) % 120;
    ctx.globalAlpha = .9;
    ctx.drawImage(starCvs, -shift * DPR, 0, (W + 120) * DPR, H * DPR, 0, 0, W + 120, H);
    ctx.globalAlpha = 1;
  }

  /* aurora ribbons — co-prime periods 7.3 / 11.7 s */
  if (!reduceMotion){
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (let a = 0; a < 2; a++){
      const period = a === 0 ? 7.3 : 11.7;
      const yBase = horizon * (.22 + a * .14);
      const grad = ctx.createLinearGradient(0, yBase - 30, 0, yBase + 30);
      grad.addColorStop(0, 'rgba(107,79,163,0)');
      grad.addColorStop(.5, a === 0 ? 'rgba(107,79,163,.16)' : 'rgba(142,163,199,.10)');
      grad.addColorStop(1, 'rgba(107,79,163,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, yBase);
      for (let x = 0; x <= W; x += 12){
        ctx.lineTo(x, yBase + Math.sin(x * .012 + drift * (6.28 / period) + a * 2) * 16);
      }
      ctx.lineTo(W, yBase + 34); ctx.lineTo(0, yBase + 34);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  /* twin moons — parallax with bearing */
  const moonShift = cur.bearing * .5;
  ctx.save();
  let mg = ctx.createRadialGradient(W * .74 - moonShift, horizon * .28, 2, W * .74 - moonShift, horizon * .28, 46);
  mg.addColorStop(0, 'rgba(246,223,164,.95)');
  mg.addColorStop(.35, 'rgba(227,176,75,.5)');
  mg.addColorStop(1, 'rgba(227,176,75,0)');
  ctx.fillStyle = mg; ctx.fillRect(0, 0, W, horizon);
  ctx.fillStyle = '#f2e3bd';
  ctx.beginPath(); ctx.arc(W * .74 - moonShift, horizon * .28, 15, 0, 7); ctx.fill();
  mg = ctx.createRadialGradient(W * .2 - moonShift * 1.4, horizon * .16, 1, W * .2 - moonShift * 1.4, horizon * .16, 22);
  mg.addColorStop(0, 'rgba(217,96,58,.8)');
  mg.addColorStop(1, 'rgba(217,96,58,0)');
  ctx.fillStyle = mg; ctx.fillRect(0, 0, W, horizon);
  ctx.fillStyle = '#d9784f';
  ctx.beginPath(); ctx.arc(W * .2 - moonShift * 1.4, horizon * .16, 6, 0, 7); ctx.fill();
  ctx.restore();

  /* FAR mountains */
  drawBand(ctx, {
    off: cur.lateral * px * .10 + cur.forward * px * .03,
    seed: 0xA11CE, baseY: horizon, amp: horizon * .42, wl: 150,
    color: '#150f28', cell: 130, structures: false
  });

  /* floating islands drift with mid parallax */
  {
    const off = cur.lateral * px * .22 + cur.forward * px * .06;
    const cell = 260;
    const c0 = Math.floor((off - 100) / cell), c1 = Math.floor((off + W + 100) / cell);
    for (let c = c0; c <= c1; c++){
      const rng = mulberry32((c * 40503) ^ 0xF10A7);
      if (rng() < .34){
        const sx = c * cell - off + rng() * cell * .7;
        const sy = horizon * (.24 + rng() * .3);
        drawIsland(ctx, rng, sx, sy, 20 + rng() * 26);
      }
    }
  }

  /* MID ridge with citadels */
  drawBand(ctx, {
    off: cur.lateral * px * .32 + cur.forward * px * .10,
    seed: 0xB227, baseY: horizon + H * .05, amp: horizon * .3, wl: 95,
    color: '#1d1735', structColor: 'rgba(24,18,44,.96)',
    cell: 92, structures: true, time
  });

  /* mist sea — swells with real water nearby */
  if (sceneCur.water > .02){
    const my = horizon + H * .02;
    const grad = ctx.createLinearGradient(0, my - 26, 0, my + 44);
    grad.addColorStop(0, 'rgba(142,163,199,0)');
    grad.addColorStop(.5, 'rgba(142,163,199,' + (0.34 * sceneCur.water) + ')');
    grad.addColorStop(1, 'rgba(142,163,199,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, my - 26, W, 74);
  }

  /* NEAR hills, trees, keeps */
  drawBand(ctx, {
    off: cur.lateral * px * .7 + cur.forward * px * .22,
    seed: 0xC33D, baseY: H * .82, amp: H * .17, wl: 70,
    color: '#241b3f', structColor: 'rgba(16,11,30,.98)',
    cell: 78, structures: true, time
  });

  /* leyline road — appears where mortal roads run */
  if (sceneCur.road > .05){
    const off = cur.lateral * px * .7;
    const a = Math.min(.9, sceneCur.road);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.lineCap = 'round';
    const bendSeed = 0xD00D;
    const topX = W / 2 + (fbm(off / 400, bendSeed) - .5) * W * .5;
    const midX = W / 2 + (fbm(off / 190 + 3.7, bendSeed) - .5) * W * .8;
    for (let pass = 0; pass < 2; pass++){
      ctx.strokeStyle = pass === 0
        ? 'rgba(227,176,75,' + (a * .16) + ')'
        : 'rgba(246,223,164,' + (a * .6) + ')';
      ctx.lineWidth = pass === 0 ? 26 : 3;
      ctx.beginPath();
      ctx.moveTo(W / 2 + (fbm(off / 90, bendSeed) - .5) * 60, H + 8);
      ctx.quadraticCurveTo(midX, H * .86, topX, horizon + H * .055);
      ctx.stroke();
    }
    /* pulses travel toward the horizon as the wayfarer moves */
    if (!reduceMotion){
      const flow = ((cur.forward * px * .12 + time * 24) % 60 + 60) % 60;
      ctx.fillStyle = 'rgba(246,223,164,' + (a * .8) + ')';
      for (let d = flow; d < 100; d += 30){
        const tt = d / 100;
        const xx = (1 - tt) * (1 - tt) * (W / 2) + 2 * (1 - tt) * tt * midX + tt * tt * topX;
        const yy = (1 - tt) * (1 - tt) * (H + 8) + 2 * (1 - tt) * tt * (H * .86) + tt * tt * (horizon + H * .055);
        ctx.beginPath(); ctx.arc(xx, yy, 2.4 * (1 - tt * .6), 0, 7); ctx.fill();
      }
    }
    ctx.restore();
  }

  /* embers */
  if (!reduceMotion){
    if (embers.length < 42 && Math.random() < .5) spawnEmber();
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (let i = embers.length - 1; i >= 0; i--){
      const e = embers[i];
      e.vx = lerp(e.vx, windVX * .02, .1);
      e.x += e.vx + Math.sin(time * 2 + i) * .15;
      e.y += e.vy * 60 * dt;
      e.life -= dt * .22;
      if (e.life <= 0 || e.y < -8){ embers.splice(i, 1); continue; }
      ctx.fillStyle = e.hot
        ? 'rgba(217,96,58,' + (e.life * .8) + ')'
        : 'rgba(227,176,75,' + (e.life * .7) + ')';
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, 7); ctx.fill();
    }
    ctx.restore();
  }

  /* atmosphere + vignette */
  const fog = ctx.createLinearGradient(0, horizon - 40, 0, H);
  fog.addColorStop(0, 'rgba(49,32,74,0)');
  fog.addColorStop(1, 'rgba(10,7,16,.55)');
  ctx.fillStyle = fog; ctx.fillRect(0, horizon - 40, W, H - horizon + 40);
  const vig = ctx.createRadialGradient(W / 2, H * .5, H * .35, W / 2, H * .5, H * .95);
  vig.addColorStop(0, 'rgba(10,7,16,0)');
  vig.addColorStop(1, 'rgba(10,7,16,.5)');
  ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(frame);
}

resize();
updateHUD();
requestAnimationFrame(frame);
</script>
</body>
