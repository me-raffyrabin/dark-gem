<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#f4d9a4;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;

  canvas{display:block}

  #ui{position:fixed;inset:0;pointer-events:none;z-index:10}

    align-items:center;justify-content:center;z-index:50;

<body>

<div id="loader">
  <div class="sun"></div>
  <div id="status">Waking the afternoon</div>

  </div>

  Move mouse to look · Scroll to zoom · Drag to orbit<br>WASD or arrows to walk
</div>

<script type="importmap">
{"imports":{"three":"https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   CONFIG
   ============================================================ */
const GRID     = 128;          // terrain vertices per side
const SPAN_KM  = 6;            // real-world square captured, in km
const WORLD    = 900;          // scene units across
const SEG      = WORLD / GRID;

const $ = id => document.getElementById(id);
const statusEl = $('status'), subEl = $('sub');

/* ============================================================
   1. LOCATION
   ============================================================ */
function getLocation(){
  return new Promise(resolve=>{
    // file:// and plain http:// are not secure contexts — the API is blocked
    // or silently never fires a callback. Skip it and let the IP path run.
    if(!window.isSecureContext || !navigator.geolocation) return resolve(null);

    let done = false;
    const finish = v => { if(!done){ done = true; resolve(v); } };

    // hard watchdog: some browsers never invoke either callback
    setTimeout(()=>finish(null), 9000);

    try{
      navigator.geolocation.getCurrentPosition(
        p => finish({lat:p.coords.latitude, lon:p.coords.longitude}),
        () => finish(null),
        {enableHighAccuracy:true, timeout:8000, maximumAge:600000}
      );
    }catch(e){ finish(null); }
  });
}

/* fetch that always settles */
function tfetch(url, ms=8000){
  return Promise.race([
    fetch(url),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), ms))
  ]);
}

async function ipFallback(){
  const eps = ['https://ipapi.co/json/','https://ipwho.is/'];
  for(const u of eps){
    try{
      const r = await tfetch(u, 6000);
      const j = await r.json();
      const lat = j.latitude, lon = j.longitude;
      if(typeof lat === 'number'){
        const city = j.city||'', reg = j.region_code||j.region||'';
        return {lat, lon, label:[city,reg].filter(Boolean).join(', ')};
      }
    }catch(e){}
  }
  return null;
}

async function reverseGeocode(lat,lon){
  try{
    const r = await tfetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=12`, 6000);
    const j = await r.json();
    const a = j.address||{};
    const city = a.city||a.town||a.village||a.hamlet||a.suburb||a.county||'';
    const region = a.state||a.country||'';
    return [city,region].filter(Boolean).join(', ');
  }catch(e){ return ''; }
}

/* ============================================================
   2. ELEVATION  (Open-Meteo — free, no key, batched)
   ============================================================ */
const DEG_LAT = 111.32;                                  // km per degree lat

async function fetchElevation(lat, lon){
  const N = 48;                                          // sample grid (48x48 = 2304 pts)
  const dLat = (SPAN_KM/DEG_LAT);
  const dLon = (SPAN_KM/(DEG_LAT*Math.cos(lat*Math.PI/180)));
  const lats=[], lons=[];
  for(let j=0;j<N;j++) for(let i=0;i<N;i++){
    lats.push((lat - dLat/2 + dLat*(j/(N-1))).toFixed(5));
    lons.push((lon - dLon/2 + dLon*(i/(N-1))).toFixed(5));
  }

  const CH = 100, out = new Float32Array(N*N);
  for(let s=0; s<lats.length; s+=CH){
    const la = lats.slice(s,s+CH).join(','), lo = lons.slice(s,s+CH).join(',');
    const r = await tfetch(`https://api.open-meteo.com/v1/elevation?latitude=${la}&longitude=${lo}`, 10000);
    if(!r.ok) throw new Error('elevation http '+r.status);
    const j = await r.json();
    j.elevation.forEach((v,k)=> out[s+k] = v);
    statusEl.textContent = `Reading the land ${Math.min(100,Math.round((s+CH)/lats.length*100))}%`;
  }
  return {data:out, n:N};
}

/* procedural fallback — ridged multifractal, still pretty */
function proceduralElevation(){
  const N=48, out=new Float32Array(N*N);
  const h=(x,y)=>{const s=Math.sin(x*12.9898+y*78.233)*43758.5453;return s-Math.floor(s);};
  const noise=(x,y)=>{
    const xi=Math.floor(x),yi=Math.floor(y),xf=x-xi,yf=y-yi;
    const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf);
    return (h(xi,yi)*(1-u)+h(xi+1,yi)*u)*(1-v)+(h(xi,yi+1)*(1-u)+h(xi+1,yi+1)*u)*v;
  };
  for(let j=0;j<N;j++)for(let i=0;i<N;i++){
    let a=1,f=.055,v=0;
    for(let o=0;o<5;o++){ v+=noise(i*f,j*f)*a; a*=.5; f*=2.05; }
    out[j*N+i]=v*260;
  }
  return {data:out,n:N};
}

/* bicubic-ish smooth upsample from N×N samples to GRID+1 resolution */
function sample(el, u, v){
  const n=el.n;
  const x=Math.min(n-1.001,Math.max(0,u*(n-1)));
  const y=Math.min(n-1.001,Math.max(0,v*(n-1)));
  const xi=Math.floor(x), yi=Math.floor(y), xf=x-xi, yf=y-yi;
  const sx=xf*xf*(3-2*xf), sy=yf*yf*(3-2*yf);
  const g=(a,b)=>el.data[Math.min(n-1,b)*n+Math.min(n-1,a)];
  return (g(xi,yi)*(1-sx)+g(xi+1,yi)*sx)*(1-sy)+(g(xi,yi+1)*(1-sx)+g(xi+1,yi+1)*sx)*sy;
}

/* ============================================================
   3. SCENE
   ============================================================ */
const scene = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 1, 6000);

/* --- sky dome: vertical gradient, warm at horizon --- */
const skyMat = new THREE.ShaderMaterial({
  side:THREE.BackSide, depthWrite:false,
  uniforms:{ top:{value:new THREE.Color(0x6fb4e0)},
             mid:{value:new THREE.Color(0xcfe4e2)},
             bot:{value:new THREE.Color(0xf9dca6)} },
  vertexShader:`varying vec3 wp; void main(){ wp=position;
    gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 wp; uniform vec3 top,mid,bot;
    void main(){ float h=normalize(wp).y;
      vec3 c = h>0.08 ? mix(mid,top,smoothstep(0.08,0.75,h))
                      : mix(bot,mid,smoothstep(-0.25,0.08,h));
      gl_FragColor=vec4(c,1.);}`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(3000,32,20), skyMat));

/* --- light --- */
const sun = new THREE.DirectionalLight(0xfff0cf, 2.5);
sun.position.set(-600, 620, 420);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
const sc = sun.shadow.camera;
sc.left=-700; sc.right=700; sc.top=700; sc.bottom=-700; sc.near=1; sc.far=2200;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xbfe0f5, 0xdcbb87, 1.0));
scene.add(new THREE.AmbientLight(0xffe9c9, 0.35));
scene.fog = new THREE.FogExp2(0xe9dcc0, 0.00075);

/* ============================================================
   4. TERRAIN
   ============================================================ */
let terrain, heights, minH=0, maxH=1, exag = 1.6;
let grassMesh, grassBase;

function buildTerrain(el){
  const geo = new THREE.PlaneGeometry(WORLD, WORLD, GRID, GRID);
  geo.rotateX(-Math.PI/2);
  const pos = geo.attributes.position;

  // raw heights
  const raw = new Float32Array(pos.count);
  for(let i=0;i<pos.count;i++){
    const u = (pos.getX(i)+WORLD/2)/WORLD;
    const v = (pos.getZ(i)+WORLD/2)/WORLD;
    raw[i] = sample(el,u,v);
  }
  minH = Math.min(...raw); maxH = Math.max(...raw);
  const range = Math.max(maxH-minH, 1);

  // normalize -> scene units. flat regions get a gentle synthetic roll
  // so coastal / plains users still see terrain instead of a pancake.
  const flat = range < 25;
  heights = new Float32Array(pos.count);
  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i), z = pos.getZ(i);
    let h = ((raw[i]-minH)/range) * 150;
    if(flat){
      h += Math.sin(x*0.011)*Math.cos(z*0.009)*16
         + Math.sin(x*0.031+z*0.017)*6;
    }
    heights[i] = h;
  }

  applyExag();

  /* vertex colors: sand -> meadow -> grass -> rock -> pale peak */
  const col = new Float32Array(pos.count*3);
  const C = [
    [0.00, new THREE.Color(0xd8c48c)],
    [0.14, new THREE.Color(0xbfc985)],
    [0.34, new THREE.Color(0x8fb46a)],
    [0.56, new THREE.Color(0x6f9a58)],
    [0.76, new THREE.Color(0x9b8f72)],
    [1.00, new THREE.Color(0xe6e2d4)],
  ];
  const tmp = new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const t = THREE.MathUtils.clamp(heights[i]/(150*exag),0,1);
    let a=C[0], b=C[C.length-1];
    for(let k=0;k<C.length-1;k++) if(t>=C[k][0]&&t<=C[k+1][0]){a=C[k];b=C[k+1];break;}
    const f=(t-a[0])/Math.max(b[0]-a[0],1e-5);
    tmp.copy(a[1]).lerp(b[1],f);
    // subtle per-vertex variation so flat shading reads organic
    const j = 0.94 + ((i*2654435761)%1000)/1000*0.12;
    col[i*3]=tmp.r*j; col[i*3+1]=tmp.g*j; col[i*3+2]=tmp.b*j;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(col,3));

  const mat = new THREE.MeshStandardMaterial({
    vertexColors:true, flatShading:true, roughness:0.94, metalness:0
  });
  terrain = new THREE.Mesh(geo, mat);
  terrain.receiveShadow = true; terrain.castShadow = true;
  scene.add(terrain);

  buildGrass();
  buildRocks();
}

function applyExag(){
  if(!terrain && !heights) return;
  const geo = terrain ? terrain.geometry : null;
  if(!geo) return;
  const pos = geo.attributes.position;
  for(let i=0;i<pos.count;i++) pos.setY(i, heights[i]*exag);
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  geo.computeBoundingSphere();
}

/* height lookup by world x,z — bilinear over the vertex grid */
function heightAt(x,z){
  if(!heights) return 0;
  const gx = (x + WORLD/2)/SEG, gz = (z + WORLD/2)/SEG;
  const xi = Math.floor(gx), zi = Math.floor(gz);
  if(xi<0||zi<0||xi>=GRID||zi>=GRID) return 0;
  const xf=gx-xi, zf=gz-zi, W=GRID+1;
  const g=(a,b)=>heights[b*W+a]*exag;
  return (g(xi,zi)*(1-xf)+g(xi+1,zi)*xf)*(1-zf)
       + (g(xi,zi+1)*(1-xf)+g(xi+1,zi+1)*xf)*zf;
}

function slopeAt(x,z){
  const d=6;
  const dx=heightAt(x+d,z)-heightAt(x-d,z);
  const dz=heightAt(x,z+d)-heightAt(x,z-d);
  return Math.sqrt(dx*dx+dz*dz)/(2*d);
}

/* ============================================================
   5. GRASS — instanced blades that sway
   ============================================================ */
const MAX_GRASS = 26000;
const grassTime = {value:0};          // must exist before buildGrass runs

function buildGrass(){
  const blade = new THREE.BufferGeometry();
  const w=1.1,h=7;
  blade.setAttribute('position', new THREE.Float32BufferAttribute([
    -w,0,0,  w,0,0,  w*0.55,h*0.55,0,
    -w,0,0,  w*0.55,h*0.55,0, -w*0.55,h*0.55,0,
    -w*0.55,h*0.55,0, w*0.55,h*0.55,0, 0,h,0
  ],3));
  blade.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color:0x86ad5c, side:THREE.DoubleSide, roughness:1, flatShading:true
  });
  // Built from char codes so no HTML-escaping / minifier can mangle the
  // angle brackets. If the token is ever missing, we skip the sway rather
  // than producing a broken shader.
  const LT = String.fromCharCode(60), GT = String.fromCharCode(62);
  const TOKEN = '#include ' + LT + 'begin_vertex' + GT;

  mat.onBeforeCompile = s=>{
    s.uniforms.uT = grassTime;
    if(s.vertexShader.indexOf(TOKEN) === -1) return;   // fail soft
    s.vertexShader = 'uniform float uT;\n' + s.vertexShader.replace(
      TOKEN,
      TOKEN + `
       float sway = transformed.y * 0.07;
       vec4 ip = instanceMatrix[3];
       transformed.x += sin(uT*1.4 + ip.x*0.05 + ip.z*0.04) * sway * 3.0;
       transformed.z += cos(uT*1.1 + ip.z*0.06) * sway * 2.0;`
    );
  };

  grassMesh = new THREE.InstancedMesh(blade, mat, MAX_GRASS);
  grassMesh.castShadow = true;
  grassMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

  const d = new THREE.Object3D();
  grassBase = [];
  let n=0, guard=0;
  while(n<MAX_GRASS && guard<MAX_GRASS*6){
    guard++;
    const x=(Math.random()-0.5)*WORLD*0.96;
    const z=(Math.random()-0.5)*WORLD*0.96;
    const y=heightAt(x,z);
    const t=y/(150*exag);
    if(t>0.72 || slopeAt(x,z)>0.9) continue;          // no grass on cliffs/peaks
    const s=0.7+Math.random()*1.5;
    d.position.set(x,y,z);
    d.rotation.set(0, Math.random()*Math.PI*2, (Math.random()-0.5)*0.25);
    d.scale.set(s,s*(0.8+Math.random()*0.9),s);
    d.updateMatrix();
    grassMesh.setMatrixAt(n, d.matrix);
    grassBase.push({x,z,s,r:d.rotation.y,ry:d.scale.y/s});
    n++;
  }
  grassMesh.count = Math.floor(n*0.6);
  scene.add(grassMesh);
}

function reseatGrass(){                                 // after exaggeration change
  if(!grassMesh) return;
  const d = new THREE.Object3D();
  for(let i=0;i<grassBase.length;i++){
    const g=grassBase[i];
    d.position.set(g.x, heightAt(g.x,g.z), g.z);
    d.rotation.set(0,g.r,0);
    d.scale.set(g.s,g.s*g.ry,g.s);
    d.updateMatrix();
    grassMesh.setMatrixAt(i,d.matrix);
  }
  grassMesh.instanceMatrix.needsUpdate = true;
}

/* ============================================================
   6. ROCKS
   ============================================================ */
function buildRocks(){
  const geo = new THREE.IcosahedronGeometry(1,0);
  const p = geo.attributes.position;
  for(let i=0;i<p.count;i++)
    p.setXYZ(i, p.getX(i)*(0.7+Math.random()*0.6),
                p.getY(i)*(0.6+Math.random()*0.5),
                p.getZ(i)*(0.7+Math.random()*0.6));
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({color:0x9d9484, flatShading:true, roughness:1});
  const rocks = new THREE.InstancedMesh(geo, mat, 340);
  rocks.castShadow = true; rocks.receiveShadow = true;

  const d = new THREE.Object3D();
  for(let i=0;i<340;i++){
    const x=(Math.random()-0.5)*WORLD*0.9, z=(Math.random()-0.5)*WORLD*0.9;
    const s=2+Math.random()*11;
    d.position.set(x, heightAt(x,z)+s*0.35, z);
    d.rotation.set(Math.random()*3,Math.random()*3,Math.random()*3);
    d.scale.setScalar(s);
    d.updateMatrix();
    rocks.setMatrixAt(i,d.matrix);
  }
  scene.add(rocks);
}

/* ============================================================
   7. CONTROLS — orbit + look + walk
   ============================================================ */
const ctl = {
  target: new THREE.Vector3(0,0,0),
  dist: 340, minD: 22, maxD: 1100,
  theta: 0.7, phi: 0.92,          // phi: 0=top-down, PI/2=horizon
  dragging:false, px:0, py:0,
  look:new THREE.Vector2(0,0),    // idle mouse-look offset
  ground:false
};

renderer.domElement.addEventListener('mousedown', e=>{
  ctl.dragging=true; ctl.px=e.clientX; ctl.py=e.clientY;
  renderer.domElement.style.cursor='grabbing';
});
addEventListener('mouseup', ()=>{ ctl.dragging=false; renderer.domElement.style.cursor='grab'; });

addEventListener('mousemove', e=>{
  if(ctl.dragging){
    ctl.theta -= (e.clientX-ctl.px)*0.005;
    ctl.phi   -= (e.clientY-ctl.py)*0.005;
    ctl.phi = THREE.MathUtils.clamp(ctl.phi, 0.06, 1.52);
    ctl.px=e.clientX; ctl.py=e.clientY;
  }else{
    ctl.look.x = (e.clientX/innerWidth - 0.5);
    ctl.look.y = (e.clientY/innerHeight - 0.5);
  }
});

addEventListener('wheel', e=>{
  e.preventDefault();
  ctl.dist = THREE.MathUtils.clamp(ctl.dist * (1 + Math.sign(e.deltaY)*0.09), ctl.minD, ctl.maxD);
},{passive:false});

/* touch */
let tPrev=null, pinch=0;
renderer.domElement.addEventListener('touchstart', e=>{
  if(e.touches.length===1) tPrev={x:e.touches[0].clientX,y:e.touches[0].clientY};
  if(e.touches.length===2) pinch=Math.hypot(
    e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
renderer.domElement.addEventListener('touchmove', e=>{
  if(e.touches.length===1&&tPrev){
    ctl.theta -= (e.touches[0].clientX-tPrev.x)*0.006;
    ctl.phi = THREE.MathUtils.clamp(ctl.phi-(e.touches[0].clientY-tPrev.y)*0.006,0.06,1.52);
    tPrev={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                       e.touches[0].clientY-e.touches[1].clientY);
    ctl.dist=THREE.MathUtils.clamp(ctl.dist*(pinch/d), ctl.minD, ctl.maxD);
    pinch=d;
  }
},{passive:true});

const keys={};
addEventListener('keydown', e=>{keys[e.key.toLowerCase()]=true;});
addEventListener('keyup',   e=>{keys[e.key.toLowerCase()]=false;});

function walk(dt){
  const sp = 150*dt*(keys['shift']?2.4:1);
  let fx=0, fz=0;
  if(keys['w']||keys['arrowup'])    fz-=1;
  if(keys['s']||keys['arrowdown'])  fz+=1;
  if(keys['a']||keys['arrowleft'])  fx-=1;
  if(keys['d']||keys['arrowright']) fx+=1;
  if(!fx&&!fz) return;
  const L=Math.hypot(fx,fz); fx/=L; fz/=L;
  const c=Math.cos(ctl.theta), s=Math.sin(ctl.theta);
  ctl.target.x = THREE.MathUtils.clamp(ctl.target.x + (fx*c - fz*s)*sp, -WORLD/2*0.9, WORLD/2*0.9);
  ctl.target.z = THREE.MathUtils.clamp(ctl.target.z + (fx*s + fz*c)*sp, -WORLD/2*0.9, WORLD/2*0.9);
}

/* ============================================================
   8. UI WIRING
   ============================================================ */
$('exag').addEventListener('input', e=>{
  exag = +e.target.value;
  $('vExag').textContent = exag.toFixed(2)+'×';
  applyExag(); reseatGrass();
});
$('grass').addEventListener('input', e=>{
  $('vGrass').textContent = e.target.value+'%';
  if(grassMesh) grassMesh.count = Math.floor(grassBase.length * e.target.value/100);
});
$('tod').addEventListener('input', e=>{
  const t = e.target.value/100;                     // 0 dawn -> 1 dusk
  const ang = (0.12 + t*0.76) * Math.PI;
  sun.position.set(Math.cos(ang)*760, Math.max(90,Math.sin(ang)*720), 380);
  const warm = 1 - Math.sin(ang);                   // low sun = warm
  sun.color.setHSL(0.10, 0.35+warm*0.4, 0.72-warm*0.12);
  skyMat.uniforms.top.value.setHSL(0.57, 0.45+warm*0.15, 0.62-warm*0.14);
  skyMat.uniforms.bot.value.setHSL(0.09, 0.55+warm*0.3, 0.80-warm*0.10);
  scene.fog.color.setHSL(0.10, 0.30+warm*0.2, 0.84-warm*0.12);
});
$('btnTop').onclick = ()=>{ ctl.ground=false; ctl.phi=0.32; ctl.dist=620; };
$('btnLow').onclick = ()=>{ ctl.ground=true;  ctl.phi=1.40; ctl.dist=34;  };
$('toggle').onclick = ()=>{
  const p=$('panel'); p.style.display = p.style.display==='none'?'block':'none';
};
$('vExag').textContent='1.60×'; $('vGrass').textContent='60%';

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ============================================================
   9. LOOP
   ============================================================ */
const clock = new THREE.Clock();
const camPos = new THREE.Vector3();
let started = false;

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  grassTime.value += dt;

  if(started){
    walk(dt);
    ctl.target.y += (heightAt(ctl.target.x, ctl.target.z) - ctl.target.y) * 0.14;

    const th = ctl.theta + ctl.look.x * 0.5;
    const ph = THREE.MathUtils.clamp(ctl.phi + ctl.look.y * 0.22, 0.06, 1.53);
    const r  = ctl.dist;

    camPos.set(
      ctl.target.x + r*Math.sin(ph)*Math.sin(th),
      ctl.target.y + r*Math.cos(ph) + (ctl.ground?6:0),
      ctl.target.z + r*Math.sin(ph)*Math.cos(th)
    );
    // never clip through the ground
    const floor = heightAt(camPos.x, camPos.z) + 8;
    if(camPos.y < floor) camPos.y = floor;

    camera.position.lerp(camPos, 0.09);
    camera.lookAt(ctl.target.x, ctl.target.y + (ctl.ground?4:18), ctl.target.z);
  }
  renderer.render(scene, camera);
}
animate();

/* ============================================================
   10. BOOT
   ============================================================ */
async function boot(){
  $('enable').classList.add('hide');
  statusEl.textContent = 'Finding you';

  let loc = await getLocation();
  let label = '';

  if(!loc){
    statusEl.textContent = 'Approximating by network';
    const f = await ipFallback();
    if(f){ loc = f; label = f.label || ''; }
  }

  let el, real = true;
  if(loc){
    if(!label){
      statusEl.textContent = 'Naming the place';
      label = await reverseGeocode(loc.lat, loc.lon);
    }
    statusEl.textContent = 'Reading the land';
    try{ el = await fetchElevation(loc.lat, loc.lon); }
    catch(e){ el = proceduralElevation(); real = false; }
  }else{
    el = proceduralElevation(); real = false;
    label = 'An imagined place';
  }

  statusEl.textContent = 'Growing grass';
  await new Promise(r=>setTimeout(r,60));
  buildTerrain(el);

  // frame the world
  ctl.target.set(0,heightAt(0,0),0);
  ctl.dist = 470; ctl.phi = 0.62; ctl.theta = 0.7;
  camera.position.set(300, 400, 300);

  $('placeName').textContent = label || 'Your terrain';
  $('placeMeta').textContent = loc
    ? `${loc.lat.toFixed(3)}, ${loc.lon.toFixed(3)} · ${SPAN_KM}km · `
      + (real ? `${Math.round(minH)}–${Math.round(maxH)}m` : 'simulated relief')
    : 'procedurally generated';

  $('place').style.display='block';
  $('panel').style.display='block';
  $('toggle').style.display='block';
  $('hint').style.display='block';
  renderer.domElement.style.cursor='grab';
  started = true;
  $('loader').classList.add('gone');
  setTimeout(()=>$('loader').remove(), 1000);
}

function reveal(){
  $('place').style.display='block';
  $('panel').style.display='block';
  $('toggle').style.display='block';
  $('hint').style.display='block';
  renderer.domElement.style.cursor='grab';
  started = true;
  $('loader').classList.add('gone');
  setTimeout(()=>{ const l=$('loader'); if(l) l.remove(); }, 1000);
}

function fail(err){
  console.error(err);
  statusEl.textContent = 'Something broke';
  subEl.textContent = String((err && err.message) || err);
  $('enable').classList.remove('hide');
  $('enable').textContent = 'Try again';
}

// surface anything that escapes, instead of a silent dead page
addEventListener('error', e=>{ if(!started) fail(e.error||e.message); });
addEventListener('unhandledrejection', e=>{ if(!started) fail(e.reason); });

$('enable').addEventListener('click', ()=>{
  boot().catch(err=>{
    console.error('boot failed:', err);
    // never strand the user on the loader — build something regardless
    try{
      if(!terrain) buildTerrain(proceduralElevation());
      ctl.target.set(0, heightAt(0,0), 0);
      ctl.dist = 470; ctl.phi = 0.62;
      $('placeName').textContent = 'An imagined place';
      $('placeMeta').textContent = 'location unavailable · procedurally generated';
      reveal();
    }catch(e2){
      fail(e2);
    }
  });
});

</script>
